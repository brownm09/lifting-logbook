services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lifting
      POSTGRES_PASSWORD: lifting
      POSTGRES_DB: lifting_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lifting -d lifting_test']
      interval: 5s
      timeout: 3s
      retries: 5
