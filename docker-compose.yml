services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lifting_logbook
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 6

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./infra/observability/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    environment:
      OTEL_COLLECTOR_OTLP_ENDPOINT: http://tempo:4318
      OTEL_COLLECTOR_OTLP_AUTH_HEADER: ""
      OTEL_COLLECTOR_LOKI_ENDPOINT: http://loki:3100/otlp
      OTEL_COLLECTOR_LOKI_AUTH_HEADER: ""
      OTEL_TAIL_SAMPLE_RATE: "100"   # local dev: keep every trace
      OTEL_DECISION_WAIT: "2s"      # local dev: short buffer so spans appear in Tempo promptly
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter
      - "13133:13133" # health_check extension
    # The collector image is distroless (no wget/curl/shell), so we cannot run
    # an in-container healthcheck. Probe the health_check extension externally
    # via the host (smoke script and humans hit http://localhost:13133/).
    depends_on:
      tempo:
        condition: service_healthy
      loki:
        condition: service_healthy

  tempo:
    image: grafana/tempo:2.5.0
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./infra/observability/tempo-local.yml:/etc/tempo/config.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # Tempo query API
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3200/ready"]
      interval: 5s
      timeout: 5s
      retries: 12

  loki:
    image: grafana/loki:3.1.0
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./infra/observability/loki-local.yml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 5s
      timeout: 5s
      retries: 12

  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./infra/observability/prometheus-local.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/ready"]
      interval: 5s
      timeout: 5s
      retries: 12
    depends_on:
      otel-collector:
        condition: service_started
      alertmanager:
        condition: service_started

  # Routes firing alert rules to notification channels (#462). Locally, delivery
  # will fail without a reachable SMTP server / valid Slack webhook — that is
  # expected; the value here is exercising the rule→route→receiver path. The
  # production target is the Grafana Cloud Alertmanager (see docs/operations/slo.md).
  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    volumes:
      - ./infra/observability/alertmanager.yaml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "127.0.0.1:9093:9093"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/ready"]
      interval: 5s
      timeout: 5s
      retries: 12

  # DEV ONLY — anonymous Admin access, never copy this auth config to staging/prod
  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3030:3000"
    depends_on:
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_healthy
      loki:
        condition: service_healthy

volumes:
  postgres_data:
  tempo_data:
  loki_data:
  prometheus_data:
  grafana_data:
