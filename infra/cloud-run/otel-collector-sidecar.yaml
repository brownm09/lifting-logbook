# OTel Collector sidecar for Cloud Run — ILLUSTRATIVE REFERENCE ONLY (wired in #768).
#
# The deploy pipeline does NOT apply this file. Because the api service is
# lifecycle.ignore_changes = [template], the sidecar is added at deploy time by deriving the
# manifest from the LIVE service (`gcloud run services describe --format=export` →
# scripts/inject-otel-sidecar.py → `gcloud run services replace`), which preserves every
# Terraform-managed field. This static file remains only as a readable illustration of the
# resulting two-container shape; the authoritative pieces are:
#   * scripts/inject-otel-sidecar.py            — the injector (source of truth for the topology)
#   * infra/cloud-run/otel-collector-config.yaml — the collector config.yaml (mounted from a secret)
#   * .github/workflows/deploy.yml               — the deploy steps that run the injector
# It may drift from the live spec (e.g. it omits KMS_KEY_NAME / the startup probe); do not treat
# it as canonical. See ADR-018 for the DaemonSet-on-GKE / sidecar-on-Cloud-Run topology decision.
#
# Template variables (illustrative):
#   $PROJECT_ID                    — GCP project ID
#   $REGION                        — GCP region (us-central1)
#   $IMAGE_TAG                     — Git SHA of the deployed api image
#   $ENVIRONMENT                   — staging | production
#   $OTEL_COLLECTOR_CONFIG_SECRET  — Secret Manager secret name holding the otel-collector config.yaml
#                                    (Cloud Run supports secret volumes, not ConfigMap volumes)

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: lifting-logbook-api
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/vpc-access-connector: projects/$PROJECT_ID/locations/$REGION/connectors/prod-connector
        run.googleapis.com/vpc-access-egress: private-ranges-only
    spec:
      serviceAccountName: lifting-logbook-prod-api-wi@$PROJECT_ID.iam.gserviceaccount.com
      containerConcurrency: 80
      containers:
        - name: api
          image: us-central1-docker.pkg.dev/$PROJECT_ID/lifting-logbook/api:$IMAGE_TAG
          ports:
            - containerPort: 3000
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: $ENVIRONMENT
            - name: PORT
              value: "3000"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://localhost:4318
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: lifting-logbook-prod-database-url
                  key: latest
            # SYSTEM_DATABASE_URL (owner/superuser cred) intentionally omitted (#534):
            # unused on the Prisma runtime path after the RLS cutover (#517).
            - name: CLERK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: lifting-logbook-prod-clerk-secret-key
                  key: latest

        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.104.0
          args: ["--config=/etc/otelcol/config.yaml"]
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
          env:
            - name: OTEL_COLLECTOR_OTLP_ENDPOINT
              value: https://otlp-gateway-prod-us-east-3.grafana.net/otlp
            # Native Loki OTLP ingestion path — see infra/observability/otel-collector.yaml
            # for why this moved off the deprecated dedicated `loki` exporter (#662).
            # Endpoints verified against the live Grafana stack 2026-07-10 (#781).
            - name: OTEL_COLLECTOR_LOKI_ENDPOINT
              value: https://logs-prod-042.grafana.net/otlp
            - name: OTEL_COLLECTOR_OTLP_AUTH_HEADER
              valueFrom:
                secretKeyRef:
                  name: lifting-logbook-prod-otel-otlp-auth-header
                  key: latest
            - name: OTEL_COLLECTOR_LOKI_AUTH_HEADER
              valueFrom:
                secretKeyRef:
                  name: lifting-logbook-prod-otel-loki-auth-header
                  key: latest
          volumeMounts:
            - name: otelconfig
              mountPath: /etc/otelcol
      volumes:
        - name: otelconfig
          secret:
            secretName: $OTEL_COLLECTOR_CONFIG_SECRET
