# Cloud Run service definition for the Lifting Logbook Next.js web frontend.
# Per ADR-009: Cloud Run receives 10% of traffic as the A/B comparison target.
#
# Template variables (substituted by CI/CD):
#   $PROJECT_ID      — GCP project ID
#   $REGION          — GCP region (us-central1)
#   $IMAGE_TAG       — Git SHA of the deployed image
#   $API_URL         — Internal Cloud Run API service URL (server-side calls)
#   $PUBLIC_API_URL  — Browser-facing (external) API URL, injected at runtime into
#                      window.__PUBLIC_CONFIG__ (#396 / ADR-028). On Cloud Run this is
#                      the same external URL as $API_URL.

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: lifting-logbook-web
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      containerConcurrency: 80
      containers:
        - image: us-central1-docker.pkg.dev/$PROJECT_ID/lifting-logbook/web:$IMAGE_TAG
          ports:
            - containerPort: 3001
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
            - name: API_URL
              value: $API_URL
            - name: PUBLIC_API_URL
              value: $PUBLIC_API_URL
            # Runtime public config (#396 / ADR-028): read by the root layout at request
            # time and passed to <ClerkProvider> as a prop — no longer NEXT_PUBLIC_ /
            # bundle-inlined. Restores the single build-once / promote-everywhere image.
            - name: CLERK_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: lifting-logbook-prod-clerk-publishable-key
                  key: latest
            - name: CLERK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: lifting-logbook-prod-clerk-secret-key
                  key: latest
