groups:
  - name: api
    rules:
      # All rules below are scoped to production via the
      # `deployment_environment_name="production"` label. Staging and production
      # share one free-tier Grafana Cloud stack, so without this scoping a staging
      # 5xx would trip the same rules that page for prod (#487). The label is set
      # as a `deployment.environment.name` resource attribute by the API/web SDKs
      # and promoted to a metric series label by the otel-collector transform
      # processor (infra/kubernetes/charts/otel-collector/templates/configmap.yaml).
      - alert: APIHighErrorRate
        expr: |
          sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~"5..", deployment_environment_name="production"}[5m]))
          / sum(rate(http_server_request_duration_seconds_count{deployment_environment_name="production"}[5m]))
          > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API error rate > 1%"
          description: "{{ $value | humanizePercentage }} of requests are returning 5xx"
          runbook_url: "https://github.com/brownm09/lifting-logbook/blob/main/docs/runbooks/api-5xx-surge.md"

      # Per-route 5xx rate. The aggregate APIHighErrorRate above can stay under 1%
      # when a single endpoint fails at 100% but carries only a small share of total
      # traffic — precisely the #458/#460 outage shape (GET /programs/:program/lifts
      # returned 500 on every call for four days, undetected). Grouping by route trips
      # this alert as soon as any one route's 5xx ratio is sustained, regardless of how
      # much traffic the rest of the API is taking.
      - alert: APIRouteHighErrorRate
        expr: |
          sum by (http_route) (rate(http_server_request_duration_seconds_count{http_response_status_code=~"5..", deployment_environment_name="production"}[5m]))
          / sum by (http_route) (rate(http_server_request_duration_seconds_count{deployment_environment_name="production"}[5m]))
          > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Route {{ $labels.http_route }} 5xx rate > 5%"
          description: "{{ $value | humanizePercentage }} of requests to {{ $labels.http_route }} are returning 5xx over the last 5m"
          runbook_url: "https://github.com/brownm09/lifting-logbook/blob/main/docs/runbooks/api-5xx-surge.md"

      - alert: APIHighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(http_server_request_duration_seconds_bucket{deployment_environment_name="production"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latency > 1s"
          description: "p95 latency is {{ $value | humanizeDuration }}"
          runbook_url: "https://github.com/brownm09/lifting-logbook/blob/main/docs/runbooks/api-5xx-surge.md"

      - alert: APINoRequests
        expr: |
          (sum(increase(http_server_request_duration_seconds_count{deployment_environment_name="production"}[10m])) or vector(0)) == 0
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "Production API received no requests in 10 minutes"
          description: "No traffic seen on production. May fire spuriously outside business hours."
          runbook_url: "https://github.com/brownm09/lifting-logbook/blob/main/docs/runbooks/api-5xx-surge.md"
