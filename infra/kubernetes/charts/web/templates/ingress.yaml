{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "lifting-logbook-web.fullname" . }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "lifting-logbook-web.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
          # Route /api/* to the API service so both apps share one LB IP
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 3000
{{- end }}
