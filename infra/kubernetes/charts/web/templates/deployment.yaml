apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lifting-logbook-web.fullname" . }}
  labels:
    app: {{ include "lifting-logbook-web.fullname" . }}
    version: {{ .Values.image.tag | quote }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ include "lifting-logbook-web.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "lifting-logbook-web.fullname" . }}
        version: {{ .Values.image.tag | quote }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "lifting-logbook-web.fullname" . }}-config
          env:
            # Runtime public config (#396 / ADR-028): read by the root layout at request
            # time and passed to <ClerkProvider> as a prop — no longer NEXT_PUBLIC_ /
            # bundle-inlined. API_URL (cluster-internal, SSR) and PUBLIC_API_URL
            # (browser-facing) come from the ConfigMap via envFrom above.
            - name: CLERK_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lifting-logbook-web.fullname" . }}-secrets
                  key: clerk-publishable-key
            - name: CLERK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lifting-logbook-web.fullname" . }}-secrets
                  key: clerk-secret-key
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
