replicaCount: 2

image:
  repository: ""
  tag: "latest"
  pullPolicy: Always

nameOverride: ""
fullnameOverride: "web"

service:
  type: ClusterIP
  port: 3001

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

env:
  NODE_ENV: production
  PORT: "3001"
  # API_URL is set per-environment in values/{staging,production}.yaml
  API_URL: ""

gcp:
  projectId: ""
  clerkPublishableKeySecretId: ""

ingress:
  enabled: true
  className: "gce"
  annotations: {}
  host: ""   # generated URL — empty means use the LB IP

livenessProbe:
  httpGet:
    path: /
    port: 3001
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  # Hits a route that exercises clerkMiddleware so a Clerk-init failure
  # (e.g. missing CLERK_SECRET_KEY, as in #382) fails readiness during
  # rollout instead of being masked by a statically-prerendered `/`.
  # Liveness stays on `/` so transient middleware blips don't crash-loop.
  httpGet:
    path: /api/healthz
    port: 3001
  initialDelaySeconds: 5
  periodSeconds: 10
