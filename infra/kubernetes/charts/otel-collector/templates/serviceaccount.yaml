apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "otel-collector.fullname" . }}
  {{- if .Values.gcp.serviceAccountEmail }}
  # Only bind a GCP service account when one is supplied. The collector reads its
  # auth headers from the otel-collector-secrets k8s Secret, not from GCP directly,
  # so it needs no Workload Identity binding in the default deploy path. An empty
  # iam.gke.io/gcp-service-account annotation is invalid, hence the guard.
  annotations:
    iam.gke.io/gcp-service-account: {{ .Values.gcp.serviceAccountEmail | quote }}
  {{- end }}
