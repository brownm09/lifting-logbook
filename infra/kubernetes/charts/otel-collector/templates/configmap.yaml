apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "otel-collector.fullname" . }}-config
data:
  OTEL_COLLECTOR_OTLP_ENDPOINT: {{ .Values.env.OTEL_COLLECTOR_OTLP_ENDPOINT | quote }}
  OTEL_COLLECTOR_LOKI_ENDPOINT: {{ .Values.env.OTEL_COLLECTOR_LOKI_ENDPOINT | quote }}
  OTEL_TAIL_SAMPLE_RATE: {{ .Values.tailSampleRate | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "otel-collector.fullname" . }}-otelconfig
data:
  config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      tail_sampling:
        decision_wait: 10s
        policies:
          - name: errors
            type: status_code
            status_code:
              status_codes: [ERROR]
          - name: slow_traces
            type: latency
            latency:
              threshold_ms: 1000
          - name: probabilistic
            type: probabilistic
            probabilistic:
              sampling_percentage: ${env:OTEL_TAIL_SAMPLE_RATE}
      batch:
        timeout: 5s
        send_batch_size: 1000

    exporters:
      otlphttp/traces:
        endpoint: ${env:OTEL_COLLECTOR_OTLP_ENDPOINT}
        headers:
          authorization: ${env:OTEL_COLLECTOR_OTLP_AUTH_HEADER}
      prometheus:
        endpoint: "0.0.0.0:8889"
      loki:
        endpoint: ${env:OTEL_COLLECTOR_LOKI_ENDPOINT}
        headers:
          authorization: ${env:OTEL_COLLECTOR_LOKI_AUTH_HEADER}

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [tail_sampling, batch]
          exporters: [otlphttp/traces]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [loki]
