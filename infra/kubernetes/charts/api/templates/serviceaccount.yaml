# Kubernetes ServiceAccount annotated for GKE Workload Identity.
# The GCP service account it impersonates is bound in infra/terraform/gke.tf.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "lifting-logbook-api.fullname" . }}
  annotations:
    iam.gke.io/gcp-service-account: {{ .Values.gcp.serviceAccountEmail | quote }}
