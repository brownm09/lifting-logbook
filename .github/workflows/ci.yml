name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'
          cache: 'npm'

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Verify package-lock.json is in sync with package.json
        # PR-scoped on purpose (issue #523). This is Layer 2 of the lockfile-drift
        # defense (issue #435): it catches a contributor editing package.json without
        # regenerating the lockfile — a PR-time mistake. On a `push` to `main` it would
        # instead recompute the ideal tree from the LIVE registry, so any caret dep
        # (direct OR transitive, e.g. a @clerk/shared in-range patch) publishing upstream
        # would redden `main` with no contributor action (#432/#433/#501/#516/#520). The
        # `npm ci` step below still runs on every push and catches install-breaking drift
        # (the EUSAGE class). See ADR-036 for the PR-scoped enforcement rationale.
        if: github.event_name == 'pull_request'
        run: |
          # Regenerate the lockfile metadata from package.json without touching
          # node_modules, then fail with a clear message if it differs from the committed
          # lockfile. This surfaces drift before the cryptic `npm ci` EUSAGE error below.
          npm install --package-lock-only --ignore-scripts
          if ! git diff --exit-code package-lock.json; then
            echo "::error::package-lock.json is out of sync with package.json."
            echo "A dependency was changed without regenerating the lockfile (the diff above shows the delta)."
            echo "Fix: run 'npm install' locally and commit the updated package-lock.json in the same change."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=apps/api/prisma/schema.prisma

      - name: Lint, Typecheck & Test
        run: npx turbo run lint typecheck test

      - name: Validate analytics taxonomy
        run: node scripts/validate-analytics-taxonomy.mjs

      - name: Verify turbo version pin sync (Dockerfile ↔ package.json)
        run: node scripts/check-turbo-version-sync.mjs

      - name: Unit test turbo version pin sync parsing
        run: node --test scripts/check-turbo-version-sync.test.mjs

  db-integration:
    name: DB Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        # Pinned digest — keep in sync with apps/api/jest.global-setup.js POSTGRES_IMAGE.
        image: postgres:16-alpine@sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229
        env:
          POSTGRES_USER: lifting
          POSTGRES_PASSWORD: lifting
          POSTGRES_DB: lifting_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=apps/api/prisma/schema.prisma

      - name: Run migrations
        run: npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://lifting:lifting@localhost:5432/lifting_test

      - name: DB Integration Tests
        run: npx turbo run test --filter=@lifting-logbook/api -- --testPathPatterns=db\\.e2e
        env:
          DATABASE_URL: postgresql://lifting:lifting@localhost:5432/lifting_test

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        run: npx turbo run build --filter=@lifting-logbook/web
        env:
          # Belt-and-suspenders for any residual build-time @clerk/clerk-react publishable-
          # key validation. The root layout now renders dynamically (force-dynamic) and
          # passes the key to <ClerkProvider> as a runtime prop from CLERK_PUBLISHABLE_KEY
          # (no NEXT_PUBLIC_ prefix, not bundle-inlined — #396 / ADR-028), so the build no
          # longer prerenders /_not-found through ClerkProvider. This validly-formatted but
          # non-functional test key (pk_test_ + base64("example.clerk.accounts.dev$")) is
          # kept so any build-time Clerk import that still reads the key sees a valid format.
          CLERK_PUBLISHABLE_KEY: pk_test_ZXhhbXBsZS5jbGVyay5hY2NvdW50cy5kZXYk

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Run E2E tests
        run: npm run test:e2e:ci -w @lifting-logbook/web
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/

  observability-smoke:
    name: Observability Stack Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for changes affecting observability stack
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "obs=true" >> "$GITHUB_OUTPUT"
            echo "No comparison base — running smoke test."
            exit 0
          fi
          if git diff --name-only "$BASE" "$HEAD" -- \
              docker-compose.yml \
              infra/observability/ \
              apps/api/src/observability/ \
              scripts/smoke-test-observability.sh \
              .github/workflows/ci.yml | grep -q .; then
            echo "obs=true" >> "$GITHUB_OUTPUT"
            echo "Observability-affecting paths changed; running smoke test."
          else
            echo "obs=false" >> "$GITHUB_OUTPUT"
            echo "No observability-affecting paths changed; skipping smoke test."
          fi

      - name: Run observability smoke test
        if: steps.changes.outputs.obs == 'true'
        run: bash scripts/smoke-test-observability.sh
