name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'
          cache: 'npm'

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=apps/api/prisma/schema.prisma

      - name: Lint & Test
        run: npx turbo run lint test

      - name: Validate analytics taxonomy
        run: node scripts/validate-analytics-taxonomy.mjs

  db-integration:
    name: DB Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lifting
          POSTGRES_PASSWORD: lifting
          POSTGRES_DB: lifting_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=apps/api/prisma/schema.prisma

      - name: Run migrations
        run: npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://lifting:lifting@localhost:5432/lifting_test

      - name: DB Integration Tests
        run: npx turbo run test --filter=@lifting-logbook/api -- --testPathPatterns=db\\.e2e
        env:
          DATABASE_URL: postgresql://lifting:lifting@localhost:5432/lifting_test

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        run: npx turbo run build --filter=@lifting-logbook/web
        env:
          # @clerk/testing@2+ upgraded @clerk/clerk-react to a version that calls
          # throwMissingPublishableKeyError during /_not-found static prerendering.
          # A placeholder key satisfies the non-empty check; dev auth (DEV_AUTH_TOKEN)
          # is used at runtime so this value is never actually sent to Clerk's API.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Run E2E tests
        run: npm run test:e2e:ci -w @lifting-logbook/web
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/

  observability-smoke:
    name: Observability Stack Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes affecting observability stack
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "obs=true" >> "$GITHUB_OUTPUT"
            echo "No comparison base — running smoke test."
            exit 0
          fi
          if git diff --name-only "$BASE" "$HEAD" -- \
              docker-compose.yml \
              infra/observability/ \
              apps/api/src/observability/ \
              scripts/smoke-test-observability.sh \
              .github/workflows/ci.yml | grep -q .; then
            echo "obs=true" >> "$GITHUB_OUTPUT"
            echo "Observability-affecting paths changed; running smoke test."
          else
            echo "obs=false" >> "$GITHUB_OUTPUT"
            echo "No observability-affecting paths changed; skipping smoke test."
          fi

      - name: Run observability smoke test
        if: steps.changes.outputs.obs == 'true'
        run: bash scripts/smoke-test-observability.sh
