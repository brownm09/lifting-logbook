name: Deploy

# Runs on every push to main.
# Pipeline: [preflight] → terraform staging → build images → deploy staging →
#           smoke test → [manual approval] → terraform production → deploy production
#
# Staging is optional. When GCP_STAGING_WORKLOAD_IDENTITY_PROVIDER is not set,
# staging jobs are skipped and the pipeline goes directly from build-images to
# deploy-production (production-only / single-user mode).
#
# Required GitHub repository secrets (see docs/deploy.md):
#   GCP_PROD_WORKLOAD_IDENTITY_PROVIDER
#   GCP_PROD_SERVICE_ACCOUNT
#   TF_STATE_BUCKET
#   GCP_BILLING_ACCOUNT   — never commit real value to tfvars; pass here instead
#
# Required GitHub repository variables (Settings → Variables, not Secrets):
#   GCP_PROD_PROJECT_ID   — project IDs are not sensitive; vars.* is not masked in outputs
#
# Optional secrets (required only when staging environment is configured):
#   GCP_STAGING_WORKLOAD_IDENTITY_PROVIDER
#   GCP_STAGING_SERVICE_ACCOUNT
#
# Optional variables (required only when staging environment is configured):
#   GCP_STAGING_PROJECT_ID

on:
  push:
    branches:
      - main

# Serialize Deploy runs on main so back-to-back pushes do not race the staging
# Terraform state lock (HTTP 412 conditionNotMet on the GCS-backed backend).
# cancel-in-progress: false ensures a production deploy in flight is never
# aborted by a later push. NOTE: GitHub Actions retains at most one pending
# run per concurrency group — when a third push arrives while a second is
# queued, the second is silently cancelled and the third takes the pending
# slot. For deploy-on-main this is the desired behavior (deploy the latest
# state, skip intermediate commits) but means "queued" ≠ FIFO. See #401.
# https://docs.github.com/en/actions/using-jobs/using-concurrency
#
# Group key is static (`deploy-main`) because the only trigger today is
# `push: main`. If a future change adds `workflow_dispatch`, `release`, or
# a second branch, parameterize the key (e.g., `deploy-${{ github.ref }}`)
# so unrelated runs are not serialized together.
concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  REGISTRY: us-central1-docker.pkg.dev
  ARTIFACT_REPO: lifting-logbook
  REGION: us-central1
  TF_DIR: infra/terraform

jobs:
  # ── 0. Preflight: detect which environments are configured ───────────────
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      staging_enabled: ${{ steps.check.outputs.staging_enabled }}
      ar_repo: ${{ steps.check.outputs.ar_repo }}
    steps:
      - id: check
        env:
          STAGING_WIF: ${{ secrets.GCP_STAGING_WORKLOAD_IDENTITY_PROVIDER }}
          PROD_PROJECT: ${{ vars.GCP_PROD_PROJECT_ID }}
        run: |
          if [[ -n "$STAGING_WIF" ]]; then
            echo "staging_enabled=true" >> "$GITHUB_OUTPUT"
            echo "ar_repo=" >> "$GITHUB_OUTPUT"   # filled by terraform-staging
            echo "Staging credentials found — full pipeline will run."
          else
            echo "staging_enabled=false" >> "$GITHUB_OUTPUT"
            echo "ar_repo=${{ env.REGISTRY }}/${PROD_PROJECT}/${{ env.ARTIFACT_REPO }}" >> "$GITHUB_OUTPUT"
            echo "Staging not configured — production-only mode."
          fi

  # ── 1. Terraform: staging ────────────────────────────────────────────────
  terraform-staging:
    name: Terraform (staging)
    runs-on: ubuntu-latest
    needs: [preflight]
    if: needs.preflight.outputs.staging_enabled == 'true'
    permissions:
      contents: read
      id-token: write
    outputs:
      gke_enabled: ${{ steps.tf-outputs.outputs.gke_enabled }}
      gke_cluster_name: ${{ steps.tf-outputs.outputs.gke_cluster_name }}
      cloud_run_api_url: ${{ steps.tf-outputs.outputs.cloud_run_api_url }}
      cloud_run_web_url: ${{ steps.tf-outputs.outputs.cloud_run_web_url }}
      ar_repo: ${{ steps.tf-outputs.outputs.ar_repo }}
      kms_key_name: ${{ steps.tf-outputs.outputs.kms_key_name }}
      api_wi_sa: ${{ steps.tf-outputs.outputs.api_wi_sa }}
      web_workload_sa: ${{ steps.tf-outputs.outputs.web_workload_sa }}

    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to GCP (staging)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_STAGING_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_STAGING_SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.7"
          terraform_wrapper: false

      - name: Terraform init (staging)
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state"
          terraform workspace select staging || terraform workspace new staging

      - name: Terraform apply (staging)
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -auto-approve \
            -var-file=terraform.tfvars.staging \
            -var="billing_account=${{ secrets.GCP_BILLING_ACCOUNT }}"

      - name: Capture Terraform outputs
        id: tf-outputs
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "gke_enabled=$(terraform output -raw gke_enabled)" >> "$GITHUB_OUTPUT"
          echo "gke_cluster_name=$(terraform output -raw gke_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "cloud_run_api_url=$(terraform output -raw cloud_run_api_url)" >> "$GITHUB_OUTPUT"
          echo "cloud_run_web_url=$(terraform output -raw cloud_run_web_url)" >> "$GITHUB_OUTPUT"
          echo "ar_repo=$(terraform output -raw artifact_registry_repo)" >> "$GITHUB_OUTPUT"
          echo "kms_key_name=$(terraform output -raw kms_key_name)" >> "$GITHUB_OUTPUT"
          echo "api_wi_sa=$(terraform output -raw cicd_service_account_email)" >> "$GITHUB_OUTPUT"
          echo "web_workload_sa=$(terraform output -raw web_workload_sa)" >> "$GITHUB_OUTPUT"

  # ── 2. Build and push Docker images ─────────────────────────────────────
  build-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [preflight, terraform-staging]
    # Run when preflight succeeds and terraform-staging either succeeded or was skipped.
    if: |
      always() &&
      needs.preflight.result == 'success' &&
      (needs.terraform-staging.result == 'success' || needs.terraform-staging.result == 'skipped')
    permissions:
      contents: read
      id-token: write
    outputs:
      ar_repo: ${{ steps.ar.outputs.repo }}

    steps:
      - uses: actions/checkout@v5

      # In staging mode, Artifact Registry lives in the staging project.
      - name: Authenticate to GCP (staging)
        if: needs.preflight.outputs.staging_enabled == 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_STAGING_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_STAGING_SERVICE_ACCOUNT }}

      # In production-only mode, use production credentials for the prod AR repo.
      - name: Authenticate to GCP (production-only mode)
        if: needs.preflight.outputs.staging_enabled != 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_PROD_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_PROD_SERVICE_ACCOUNT }}

      - name: Resolve Artifact Registry repo
        id: ar
        run: |
          STAGING_REPO="${{ needs.terraform-staging.outputs.ar_repo }}"
          PREFLIGHT_REPO="${{ needs.preflight.outputs.ar_repo }}"
          echo "repo=${STAGING_REPO:-$PREFLIGHT_REPO}" >> "$GITHUB_OUTPUT"

      # ── Per-env value resolution for web image build (ADR-025) ────────────
      # NEXT_PUBLIC_* values are inlined into the Next.js JS bundle at build
      # time, so the web image is built once per target env with that env's
      # values. Both image variants are pushed to the same AR repo (steps.ar)
      # — the same pattern the API image uses today; per-env AR routing is
      # out of scope for this change.

      - name: Resolve staging API URL (web image build)
        id: api-url-staging
        if: needs.preflight.outputs.staging_enabled == 'true'
        run: |
          echo "url=${{ needs.terraform-staging.outputs.cloud_run_api_url }}" >> "$GITHUB_OUTPUT"

      - name: Resolve staging Clerk publishable key (web image build)
        id: clerk-pub-staging
        if: needs.preflight.outputs.staging_enabled == 'true'
        run: |
          # NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY is build-time embedded in the
          # Next.js bundle (see apps/web/Dockerfile ARG). Without it, `next
          # build` aborts on /_not-found prerender because <ClerkProvider>
          # in the root layout throws "Missing publishableKey".
          KEY=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-stg-clerk-publishable-key" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}")
          [ -n "$KEY" ] || { echo "ERROR: staging clerk-publishable-key fetch returned empty"; exit 1; }
          # Use ::add-mask:: so the key never appears in logs even though
          # it is a publishable (non-secret) Clerk key. Defense in depth.
          echo "::add-mask::$KEY"
          # GITHUB_OUTPUT does not accept multi-line values without delimiters
          # but the Clerk publishable key is a single line so a direct echo
          # is safe.
          echo "key=${KEY}" >> "$GITHUB_OUTPUT"

      # Production-value resolution requires auth to the prod project. The
      # staging auth above is replaced for the duration of these steps; the
      # API image build and any subsequent staging push re-authenticate to
      # staging below. In production-only mode this is a no-op re-auth.
      - name: Authenticate to GCP (production, for prod web build-args)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_PROD_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_PROD_SERVICE_ACCOUNT }}

      - name: Resolve production API URL (web image build)
        id: api-url-prod
        run: |
          # The prod Cloud Run API service is created by terraform-production,
          # which runs *after* this job. On first-time prod bootstrap the
          # `describe` call fails; rerun this workflow after the prod Cloud
          # Run service exists. Tracked as a known limitation in ADR-025.
          URL=$(gcloud run services describe lifting-logbook-prod-api \
            --region="${{ env.REGION }}" \
            --project="${{ vars.GCP_PROD_PROJECT_ID }}" \
            --format="value(status.url)")
          [ -n "$URL" ] || { echo "ERROR: prod API URL fetch returned empty (is lifting-logbook-prod-api deployed?)"; exit 1; }
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Resolve production Clerk publishable key (web image build)
        id: clerk-pub-prod
        run: |
          KEY=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-prod-clerk-publishable-key" \
            --project="${{ vars.GCP_PROD_PROJECT_ID }}")
          [ -n "$KEY" ] || { echo "ERROR: prod clerk-publishable-key fetch returned empty"; exit 1; }
          echo "::add-mask::$KEY"
          echo "key=${KEY}" >> "$GITHUB_OUTPUT"

      # Restore staging auth for the image pushes that target the staging AR.
      - name: Re-authenticate to GCP (staging, restore for pushes)
        if: needs.preflight.outputs.staging_enabled == 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_STAGING_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_STAGING_SERVICE_ACCOUNT }}

      # Auth context invariant: at this point, credentials must be capable of
      # pushing to steps.ar.outputs.repo. In staging-enabled mode that means
      # staging-AR-capable (restored by the Re-authenticate step above); in
      # production-only mode the prod auth step above is sufficient. Any step
      # inserted between the auth-restore and here must preserve this invariant
      # (do not call `auth` with a different identity between them).
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ steps.ar.outputs.repo }}/api:${{ github.sha }}
            ${{ steps.ar.outputs.repo }}/api:latest
          # Per-image cache scope (#407). Same rationale as the web builds
          # below — isolates the API build cache from any other image flavor
          # so a stale layer in one cannot poison another. `-v2` suffix forces
          # a one-time miss on merge.
          cache-from: type=gha,scope=api-deploy-v2
          cache-to: type=gha,scope=api-deploy-v2,mode=max

      # ── Web image: per-env builds (ADR-025) ────────────────────────────────
      # Two builds with per-env NEXT_PUBLIC_* values. The staging tag is built
      # and pushed only when staging is enabled; the prod tag is always built.
      # Both push to the same AR repo as the API image (steps.ar.outputs.repo).

      - name: Build and push web image (staging)
        if: needs.preflight.outputs.staging_enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ steps.ar.outputs.repo }}/web:${{ github.sha }}-staging
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.api-url-staging.outputs.url }}
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ steps.clerk-pub-staging.outputs.key }}
          # Per-env cache scope (#407). Previously both staging and prod web
          # builds shared an unscoped `type=gha`, which was suspected of
          # poisoning the cache across builds — three consecutive main runs
          # produced images missing /livez (then /healthz) from the standalone tree despite
          # the route being on main. Scoping isolates per-image-flavor caches
          # and the new name (`-v2`) forces a one-time miss on this PR's merge,
          # rebuilding the next-build layer from scratch.
          cache-from: type=gha,scope=web-staging-v2
          cache-to: type=gha,scope=web-staging-v2,mode=max

      # `:latest` is intentionally moved here from the (previously single) web
      # build. In staging-enabled mode this means the `:latest` tag in the
      # staging AR resolves to the *prod*-configured bundle, not the
      # staging-configured one. Any downstream consumer that pulls `:latest`
      # from the staging AR (manual ops, cache-warming jobs) must be aware of
      # this asymmetry. The staging deploy never references `:latest` — it
      # uses the explicit `-staging` SHA tag — so the asymmetry is invisible
      # to the deploy pipeline itself.
      - name: Build and push web image (production)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ steps.ar.outputs.repo }}/web:${{ github.sha }}-prod
            ${{ steps.ar.outputs.repo }}/web:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.api-url-prod.outputs.url }}
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ steps.clerk-pub-prod.outputs.key }}
          # Per-env cache scope (#407) — see staging build above for context.
          cache-from: type=gha,scope=web-prod-v2
          cache-to: type=gha,scope=web-prod-v2,mode=max

      # ── Copy images to production AR (#411) ────────────────────────────────
      # `steps.ar.outputs.repo` resolves to the *staging* AR in staging-enabled
      # mode, so the api:<sha> and web:<sha>-prod tags pushed above only live
      # in the staging registry. `deploy-production` pulls from the prod AR
      # (steps.tf-prod.outputs.ar_repo) and would 404. Copy both images to the
      # prod AR with `docker buildx imagetools create` — a registry-to-registry
      # copy that does not require a rebuild or local Docker image state.
      #
      # Guarded by staging_enabled because production-only mode already pushed
      # directly to the prod AR (steps.ar.outputs.repo resolves to prod there).

      - name: Resolve production AR repo
        id: ar-prod
        if: needs.preflight.outputs.staging_enabled == 'true'
        run: |
          echo "repo=${{ env.REGISTRY }}/${{ vars.GCP_PROD_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP (production, for prod-AR push)
        if: needs.preflight.outputs.staging_enabled == 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_PROD_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_PROD_SERVICE_ACCOUNT }}

      - name: Configure Docker for prod AR
        if: needs.preflight.outputs.staging_enabled == 'true'
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # `imagetools create` reads the source manifest from the staging AR and
      # writes new tags in the prod AR. The prod CI/CD SA must have
      # `roles/artifactregistry.reader` on the staging AR for the read; if
      # this errors with permission denied, grant that role and rerun.
      - name: Copy API image to prod AR
        if: needs.preflight.outputs.staging_enabled == 'true'
        run: |
          docker buildx imagetools create \
            --tag ${{ steps.ar-prod.outputs.repo }}/api:${{ github.sha }} \
            --tag ${{ steps.ar-prod.outputs.repo }}/api:latest \
            ${{ steps.ar.outputs.repo }}/api:${{ github.sha }}

      - name: Copy web image to prod AR
        if: needs.preflight.outputs.staging_enabled == 'true'
        run: |
          docker buildx imagetools create \
            --tag ${{ steps.ar-prod.outputs.repo }}/web:${{ github.sha }}-prod \
            --tag ${{ steps.ar-prod.outputs.repo }}/web:latest \
            ${{ steps.ar.outputs.repo }}/web:${{ github.sha }}-prod

      # Auth context invariant: build-images now ends with the prod CI/CD SA
      # active (the auth swap above for the imagetools copy is not restored).
      # Any step appended after this point that needs staging-AR or staging-
      # project credentials must re-auth to staging first (see the existing
      # restore pattern at the start of the API/web push block above). The
      # `staging_enabled == 'true'` guard does not save you — production-only
      # mode skips the entire copy block and leaves the staging auth from the
      # job header active, so a forgotten re-auth will silently flip behavior
      # between the two modes.

  # ── 3. Deploy to staging ─────────────────────────────────────────────────
  deploy-staging:
    name: Deploy (staging)
    runs-on: ubuntu-latest
    needs: [preflight, terraform-staging, build-images]
    if: needs.preflight.outputs.staging_enabled == 'true' && needs.build-images.result == 'success'
    permissions:
      contents: read
      id-token: write
    environment: staging

    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to GCP (staging)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_STAGING_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_STAGING_SERVICE_ACCOUNT }}

      # ── Database migrations (ADR-027) ──────────────────────────────────────
      # Mirror of the production migration step (see deploy-production). Applies
      # pending migrations to the staging DB before the API revision goes live so
      # staging exercises the same migrate path as prod rather than relying on
      # Terraform re-provisioning to mask drift (#460).
      - name: Run database migrations (staging)
        run: |
          gcloud run jobs update lifting-logbook-stg-migrate \
            --image="${{ needs.build-images.outputs.ar_repo }}/api:${{ github.sha }}" \
            --region="${{ env.REGION }}" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}" \
            --quiet
          gcloud run jobs execute lifting-logbook-stg-migrate \
            --region="${{ env.REGION }}" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}" \
            --wait

      # GKE-only steps below are skipped when terraform var enable_gke = false
      # (single-user / Cloud-Run-only deployments).
      - name: Set up GKE credentials
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ needs.terraform-staging.outputs.gke_cluster_name }}
          location: ${{ env.REGION }}
          project_id: ${{ vars.GCP_STAGING_PROJECT_ID }}

      - name: Set up Helm
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        uses: azure/setup-helm@v4

      - name: Ensure staging namespace
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        run: kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f -

      # Sync secrets from Secret Manager → Kubernetes Secrets
      - name: Sync API secrets to Kubernetes
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        run: |
          DB_URL=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-stg-database-url" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}")
          SYS_DB_URL=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-stg-system-database-url" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}")
          CLERK_KEY=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-stg-clerk-secret-key" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}")
          kubectl create secret generic api-secrets \
            --namespace=staging \
            --from-literal=database-url="$DB_URL" \
            --from-literal=system-database-url="$SYS_DB_URL" \
            --from-literal=clerk-secret-key="$CLERK_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Sync web secrets to Kubernetes
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        run: |
          CLERK_PUB=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-stg-clerk-publishable-key" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}")
          [ -n "$CLERK_PUB" ] || { echo "ERROR: clerk-publishable-key fetch returned empty (staging)"; exit 1; }
          CLERK_KEY=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-stg-clerk-secret-key" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}")
          [ -n "$CLERK_KEY" ] || { echo "ERROR: clerk-secret-key fetch returned empty (staging)"; exit 1; }
          kubectl create secret generic web-secrets \
            --namespace=staging \
            --from-literal=clerk-publishable-key="$CLERK_PUB" \
            --from-literal=clerk-secret-key="$CLERK_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm deploy API (GKE staging)
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        run: |
          helm upgrade --install api ./infra/kubernetes/charts/api \
            --namespace=staging \
            --values=infra/kubernetes/values/staging-api.yaml \
            --set image.repository="${{ needs.build-images.outputs.ar_repo }}/api" \
            --set image.tag="${{ github.sha }}" \
            --set gcp.projectId="${{ vars.GCP_STAGING_PROJECT_ID }}" \
            --set gcp.kmsKeyName="${{ needs.terraform-staging.outputs.kms_key_name }}" \
            --set gcp.serviceAccountEmail="${{ needs.terraform-staging.outputs.api_wi_sa }}" \
            --set env.NODE_ENV=staging \
            --wait --timeout=5m

      - name: Helm deploy web (GKE staging)
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        run: |
          API_CLUSTER_URL="http://api.staging.svc.cluster.local:3000"
          helm upgrade --install web ./infra/kubernetes/charts/web \
            --namespace=staging \
            --values=infra/kubernetes/values/staging-web.yaml \
            --set image.repository="${{ needs.build-images.outputs.ar_repo }}/web" \
            --set image.tag="${{ github.sha }}-staging" \
            --set gcp.projectId="${{ vars.GCP_STAGING_PROJECT_ID }}" \
            --set env.NODE_ENV=staging \
            --set env.API_URL="$API_CLUSTER_URL" \
            --wait --timeout=5m

      # Cloud Run: A/B comparison target (10% traffic — ADR-009)
      - name: Deploy API to Cloud Run (staging)
        run: |
          gcloud run deploy lifting-logbook-stg-api \
            --image="${{ needs.build-images.outputs.ar_repo }}/api:${{ github.sha }}" \
            --region="${{ env.REGION }}" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}" \
            --platform=managed \
            --no-allow-unauthenticated \
            --quiet

      - name: Deploy web to Cloud Run (staging)
        run: |
          gcloud run deploy lifting-logbook-stg-web \
            --image="${{ needs.build-images.outputs.ar_repo }}/web:${{ github.sha }}-staging" \
            --region="${{ env.REGION }}" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}" \
            --platform=managed \
            --allow-unauthenticated \
            --service-account="${{ needs.terraform-staging.outputs.web_workload_sa }}" \
            --set-env-vars="API_URL=${{ needs.terraform-staging.outputs.cloud_run_api_url }}" \
            --update-secrets="CLERK_SECRET_KEY=lifting-logbook-stg-clerk-secret-key:latest" \
            --quiet

  # ── 4. Smoke test staging ────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test (staging)
    runs-on: ubuntu-latest
    needs: [preflight, deploy-staging, terraform-staging]
    if: needs.preflight.outputs.staging_enabled == 'true' && needs.deploy-staging.result == 'success'

    steps:
      # Two-probe staging smoke (#402, renamed /healthz → /livez in #409).
      # One probe owned by app code (/livez), one by the user-facing auth
      # flow (/sign-in). They distinguish three failure modes that a single
      # `/` probe collapsed into "404":
      #   /livez 200, /sign-in 200 → safe to promote
      #   /livez 200, /sign-in non-200 → Clerk middleware misconfigured
      #   /livez non-200 → Next.js runtime not booting
      # /livez is excluded from clerkMiddleware's matcher; /sign-in is
      # auth-public via createRouteMatcher.
      #
      # Probe path is /livez (Kubernetes liveness convention), NOT /healthz —
      # Google Frontend on Cloud Run intercepts /healthz before requests reach
      # the container, returning Google's branded 404 page even when the
      # in-image route is correct. /livez, /readyz, /health, and other
      # sibling paths pass through to Next.js normally. See #409 for the
      # full diagnostic chain.
      - name: Smoke test Cloud Run staging — /livez (web runtime)
        run: |
          # %/ strips a trailing slash so $BASE_URL/livez never becomes
          # https://.../livez double-slashed (#405 review finding).
          BASE_URL="${{ needs.terraform-staging.outputs.cloud_run_web_url }}"
          BASE_URL="${BASE_URL%/}"
          # Allow up to 3 minutes for Cloud Run to become healthy
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/livez" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Staging /livez returned 200 — OK"
              exit 0
            fi
            echo "/livez attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Staging /livez smoke FAILED — Next.js runtime not serving 200 (probe owned by app code, distinct from Clerk auth flow)" && exit 1

      - name: Smoke test Cloud Run staging — /sign-in (Clerk auth flow)
        run: |
          BASE_URL="${{ needs.terraform-staging.outputs.cloud_run_web_url }}"
          BASE_URL="${BASE_URL%/}"
          # The runtime is already up (/livez succeeded immediately before this
          # step). /sign-in should respond within seconds, not minutes — if Clerk
          # middleware can't serve 200 in 60s the failure mode this PR is designed
          # to surface has occurred, and fast failure improves operator turnaround.
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/sign-in" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Staging /sign-in returned 200 — OK"
              exit 0
            fi
            echo "/sign-in attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Staging /sign-in smoke FAILED — runtime healthy but Clerk auth flow not serving 200 (check middleware matcher and Clerk env vars)" && exit 1

      - name: Smoke test Cloud Run staging (API auth check)
        run: |
          # API requires Cloud Run IAM auth — a 403 confirms it is up and rejecting
          # unauthenticated requests correctly. A 200 is also acceptable (e.g., if
          # service-to-service auth is later wired up via a service account).
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ needs.terraform-staging.outputs.cloud_run_api_url }}/health")
          if [ "$STATUS" = "403" ] || [ "$STATUS" = "200" ]; then
            echo "API smoke test passed (status=$STATUS)"
          else
            echo "API smoke test failed: expected 200 or 403, got $STATUS" && exit 1
          fi

  # ── 5. Deploy to production (requires manual approval) ───────────────────
  # The `environment: production` reference below is the manual approval gate.
  # GitHub raises one required-reviewer prompt per job that targets a protected
  # environment, so the gate lives on this job alone — the job that actually
  # deploys — giving a single approval, the GitHub-enforced backstop on the
  # real deploy, and an accurate deployment record against the production
  # environment.
  #
  # History: a separate `approve-production` job previously carried this
  # environment "in addition to" deploy-production (#417), on the assumption
  # that two jobs sharing one environment would prompt only once. They don't —
  # GitHub prompts per-job — which produced a double approval (#451). The gate
  # is now consolidated onto the deploy job, where the environment protection
  # belongs.
  deploy-production:
    name: Deploy (production)
    runs-on: ubuntu-latest
    needs: [preflight, build-images, deploy-staging, smoke-test]
    # Only deploy when the pipeline is actually ready: build succeeded and,
    # when staging is enabled, the staging smoke test passed. `always()` lets
    # this run even though deploy-staging/smoke-test are skipped in
    # production-only mode (their `skipped` result is not `success`).
    if: |
      always() &&
      needs.build-images.result == 'success' &&
      (
        needs.preflight.outputs.staging_enabled != 'true' ||
        needs.smoke-test.result == 'success'
      )
    permissions:
      contents: read
      id-token: write
    environment: production   # manual approval gate (required reviewer, #417)

    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to GCP (production)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_PROD_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_PROD_SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.7"
          terraform_wrapper: false

      - name: Terraform apply (production)
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state"
          terraform workspace select production || terraform workspace new production
          terraform apply -auto-approve \
            -var-file=terraform.tfvars.production \
            -var="billing_account=${{ secrets.GCP_BILLING_ACCOUNT }}"

      - name: Capture production Terraform outputs
        id: tf-prod
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "gke_enabled=$(terraform output -raw gke_enabled)" >> "$GITHUB_OUTPUT"
          echo "gke_cluster_name=$(terraform output -raw gke_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "cloud_run_api_url=$(terraform output -raw cloud_run_api_url)" >> "$GITHUB_OUTPUT"
          echo "cloud_run_web_url=$(terraform output -raw cloud_run_web_url)" >> "$GITHUB_OUTPUT"
          echo "ar_repo=$(terraform output -raw artifact_registry_repo)" >> "$GITHUB_OUTPUT"
          echo "kms_key_name=$(terraform output -raw kms_key_name)" >> "$GITHUB_OUTPUT"
          echo "api_wi_sa=$(terraform output -raw cicd_service_account_email)" >> "$GITHUB_OUTPUT"
          echo "web_workload_sa=$(terraform output -raw web_workload_sa)" >> "$GITHUB_OUTPUT"

      # ── Database migrations (ADR-027) ──────────────────────────────────────
      # Apply pending Prisma migrations to the prod DB via an in-VPC Cloud Run
      # Job *before* the API revision goes live. The prod Cloud SQL instance has
      # a private IP only and is unreachable from this runner directly, so the
      # job (created by `Terraform apply (production)` above) runs inside the VPC
      # via the same connector the API uses. Terraform applies a placeholder
      # image, so set the real image, then execute and wait. `--wait` returns
      # non-zero if the migration (or the `migrate status` drift check baked into
      # the job) fails, which halts the deploy and leaves the last-good API
      # revision serving. This step is the systemic fix for #460: the pipeline
      # previously never ran `migrate deploy` against prod, so the schema drifted
      # silently until an endpoint hit a missing table and 500'd (#458).
      - name: Run database migrations (production)
        run: |
          gcloud run jobs update lifting-logbook-prod-migrate \
            --image="${{ steps.tf-prod.outputs.ar_repo }}/api:${{ github.sha }}" \
            --region="${{ env.REGION }}" \
            --project="${{ vars.GCP_PROD_PROJECT_ID }}" \
            --quiet
          gcloud run jobs execute lifting-logbook-prod-migrate \
            --region="${{ env.REGION }}" \
            --project="${{ vars.GCP_PROD_PROJECT_ID }}" \
            --wait

      # GKE-only steps below are skipped when terraform var enable_gke = false
      # (single-user / Cloud-Run-only deployments).
      - name: Set up GKE credentials (production)
        if: steps.tf-prod.outputs.gke_enabled == 'true'
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ steps.tf-prod.outputs.gke_cluster_name }}
          location: ${{ env.REGION }}
          project_id: ${{ vars.GCP_PROD_PROJECT_ID }}

      - name: Set up Helm
        if: steps.tf-prod.outputs.gke_enabled == 'true'
        uses: azure/setup-helm@v4

      - name: Ensure production namespace
        if: steps.tf-prod.outputs.gke_enabled == 'true'
        run: kubectl create namespace production --dry-run=client -o yaml | kubectl apply -f -

      - name: Sync API secrets to Kubernetes (production)
        if: steps.tf-prod.outputs.gke_enabled == 'true'
        run: |
          DB_URL=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-prod-database-url" \
            --project="${{ vars.GCP_PROD_PROJECT_ID }}")
          SYS_DB_URL=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-prod-system-database-url" \
            --project="${{ vars.GCP_PROD_PROJECT_ID }}")
          CLERK_KEY=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-prod-clerk-secret-key" \
            --project="${{ vars.GCP_PROD_PROJECT_ID }}")
          kubectl create secret generic api-secrets \
            --namespace=production \
            --from-literal=database-url="$DB_URL" \
            --from-literal=system-database-url="$SYS_DB_URL" \
            --from-literal=clerk-secret-key="$CLERK_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Sync web secrets to Kubernetes (production)
        if: steps.tf-prod.outputs.gke_enabled == 'true'
        run: |
          CLERK_PUB=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-prod-clerk-publishable-key" \
            --project="${{ vars.GCP_PROD_PROJECT_ID }}")
          [ -n "$CLERK_PUB" ] || { echo "ERROR: clerk-publishable-key fetch returned empty (production)"; exit 1; }
          CLERK_KEY=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-prod-clerk-secret-key" \
            --project="${{ vars.GCP_PROD_PROJECT_ID }}")
          [ -n "$CLERK_KEY" ] || { echo "ERROR: clerk-secret-key fetch returned empty (production)"; exit 1; }
          kubectl create secret generic web-secrets \
            --namespace=production \
            --from-literal=clerk-publishable-key="$CLERK_PUB" \
            --from-literal=clerk-secret-key="$CLERK_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm deploy API (GKE production)
        if: steps.tf-prod.outputs.gke_enabled == 'true'
        run: |
          helm upgrade --install api ./infra/kubernetes/charts/api \
            --namespace=production \
            --values=infra/kubernetes/values/production-api.yaml \
            --set image.repository="${{ steps.tf-prod.outputs.ar_repo }}/api" \
            --set image.tag="${{ github.sha }}" \
            --set gcp.projectId="${{ vars.GCP_PROD_PROJECT_ID }}" \
            --set gcp.kmsKeyName="${{ steps.tf-prod.outputs.kms_key_name }}" \
            --set gcp.serviceAccountEmail="${{ steps.tf-prod.outputs.api_wi_sa }}" \
            --set env.NODE_ENV=production \
            --wait --timeout=5m

      - name: Helm deploy web (GKE production)
        if: steps.tf-prod.outputs.gke_enabled == 'true'
        run: |
          API_CLUSTER_URL="http://api.production.svc.cluster.local:3000"
          helm upgrade --install web ./infra/kubernetes/charts/web \
            --namespace=production \
            --values=infra/kubernetes/values/production-web.yaml \
            --set image.repository="${{ steps.tf-prod.outputs.ar_repo }}/web" \
            --set image.tag="${{ github.sha }}-prod" \
            --set gcp.projectId="${{ vars.GCP_PROD_PROJECT_ID }}" \
            --set env.NODE_ENV=production \
            --set env.API_URL="$API_CLUSTER_URL" \
            --wait --timeout=5m

      - name: Deploy API to Cloud Run (production)
        run: |
          gcloud run deploy lifting-logbook-prod-api \
            --image="${{ steps.tf-prod.outputs.ar_repo }}/api:${{ github.sha }}" \
            --region="${{ env.REGION }}" \
            --project="${{ vars.GCP_PROD_PROJECT_ID }}" \
            --platform=managed \
            --no-allow-unauthenticated \
            --quiet

      - name: Deploy web to Cloud Run (production)
        run: |
          gcloud run deploy lifting-logbook-prod-web \
            --image="${{ steps.tf-prod.outputs.ar_repo }}/web:${{ github.sha }}-prod" \
            --region="${{ env.REGION }}" \
            --project="${{ vars.GCP_PROD_PROJECT_ID }}" \
            --platform=managed \
            --allow-unauthenticated \
            --service-account="${{ steps.tf-prod.outputs.web_workload_sa }}" \
            --set-env-vars="API_URL=${{ steps.tf-prod.outputs.cloud_run_api_url }}" \
            --update-secrets="CLERK_SECRET_KEY=lifting-logbook-prod-clerk-secret-key:latest" \
            --quiet

      - name: Print deployment URLs
        run: |
          echo "## Production deployment complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- Cloud Run web: ${{ steps.tf-prod.outputs.cloud_run_web_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Cloud Run API: ${{ steps.tf-prod.outputs.cloud_run_api_url }}" >> "$GITHUB_STEP_SUMMARY"
