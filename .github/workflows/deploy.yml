name: Deploy

# Runs on every push to main.
# Pipeline: [preflight] → terraform staging → build images → deploy staging →
#           smoke test → [manual approval] → terraform production → deploy production
#
# Staging is optional. When GCP_STAGING_WORKLOAD_IDENTITY_PROVIDER is not set,
# staging jobs are skipped and the pipeline goes directly from build-images to
# deploy-production (production-only / single-user mode).
#
# Required GitHub repository secrets (see docs/deploy.md):
#   GCP_PROD_WORKLOAD_IDENTITY_PROVIDER
#   GCP_PROD_SERVICE_ACCOUNT
#   TF_STATE_BUCKET
#   GCP_BILLING_ACCOUNT   — never commit real value to tfvars; pass here instead
#
# Required GitHub repository variables (Settings → Variables, not Secrets):
#   GCP_PROD_PROJECT_ID   — project IDs are not sensitive; vars.* is not masked in outputs
#
# Optional secrets (required only when staging environment is configured):
#   GCP_STAGING_WORKLOAD_IDENTITY_PROVIDER
#   GCP_STAGING_SERVICE_ACCOUNT
#
# Optional variables (required only when staging environment is configured):
#   GCP_STAGING_PROJECT_ID

on:
  push:
    branches:
      - main

# Serialize Deploy runs on main so back-to-back pushes do not race the staging
# Terraform state lock (HTTP 412 conditionNotMet on the GCS-backed backend).
# cancel-in-progress: false ensures a production deploy in flight is never
# aborted by a later push. NOTE: GitHub Actions retains at most one pending
# run per concurrency group — when a third push arrives while a second is
# queued, the second is silently cancelled and the third takes the pending
# slot. For deploy-on-main this is the desired behavior (deploy the latest
# state, skip intermediate commits) but means "queued" ≠ FIFO. See #401.
# https://docs.github.com/en/actions/using-jobs/using-concurrency
#
# Group key is static (`deploy-main`) because the only trigger today is
# `push: main`. If a future change adds `workflow_dispatch`, `release`, or
# a second branch, parameterize the key (e.g., `deploy-${{ github.ref }}`)
# so unrelated runs are not serialized together.
concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  REGISTRY: us-central1-docker.pkg.dev
  ARTIFACT_REPO: lifting-logbook
  REGION: us-central1
  TF_DIR: infra/terraform

jobs:
  # ── 0. Preflight: detect which environments are configured ───────────────
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      staging_enabled: ${{ steps.check.outputs.staging_enabled }}
      ar_repo: ${{ steps.check.outputs.ar_repo }}
    steps:
      - id: check
        env:
          STAGING_WIF: ${{ secrets.GCP_STAGING_WORKLOAD_IDENTITY_PROVIDER }}
          PROD_PROJECT: ${{ vars.GCP_PROD_PROJECT_ID }}
        run: |
          if [[ -n "$STAGING_WIF" ]]; then
            echo "staging_enabled=true" >> "$GITHUB_OUTPUT"
            echo "ar_repo=" >> "$GITHUB_OUTPUT"   # filled by terraform-staging
            echo "Staging credentials found — full pipeline will run."
          else
            echo "staging_enabled=false" >> "$GITHUB_OUTPUT"
            echo "ar_repo=${{ env.REGISTRY }}/${PROD_PROJECT}/${{ env.ARTIFACT_REPO }}" >> "$GITHUB_OUTPUT"
            echo "Staging not configured — production-only mode."
          fi

  # ── 1. Terraform: staging ────────────────────────────────────────────────
  terraform-staging:
    name: Terraform (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [preflight]
    if: needs.preflight.outputs.staging_enabled == 'true'
    permissions:
      contents: read
      id-token: write
    outputs:
      gke_enabled: ${{ steps.tf-outputs.outputs.gke_enabled }}
      gke_cluster_name: ${{ steps.tf-outputs.outputs.gke_cluster_name }}
      cloud_run_api_url: ${{ steps.tf-outputs.outputs.cloud_run_api_url }}
      cloud_run_web_url: ${{ steps.tf-outputs.outputs.cloud_run_web_url }}
      ar_repo: ${{ steps.tf-outputs.outputs.ar_repo }}
      otel_mirror_repo: ${{ steps.tf-outputs.outputs.otel_mirror_repo }}
      kms_key_name: ${{ steps.tf-outputs.outputs.kms_key_name }}
      api_wi_sa: ${{ steps.tf-outputs.outputs.api_wi_sa }}
      web_workload_sa: ${{ steps.tf-outputs.outputs.web_workload_sa }}

    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to GCP (staging)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_STAGING_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_STAGING_SERVICE_ACCOUNT }}

      - name: Terraform setup + init (staging)
        uses: ./.github/actions/tf-init
        with:
          workspace: staging
          state-bucket: ${{ secrets.TF_STATE_BUCKET }}

      - name: Terraform apply (staging)
        working-directory: ${{ env.TF_DIR }}
        # Bounded retry absorbs transient GCP API 5xx / eventual-consistency
        # during apply (a real CI red-run driver per the #498 diagnosis —
        # docs/runbooks/staging-ci-flakiness.md; #504 applies it here for prod
        # parity). terraform apply is re-runnable; a genuine config error fails
        # both attempts and hard-fails.
        run: |
          for attempt in 1 2; do
            if terraform apply -auto-approve \
                 -var-file=terraform.tfvars.staging \
                 -var="billing_account=${{ secrets.GCP_BILLING_ACCOUNT }}"; then
              exit 0
            fi
            if [ "${attempt}" -lt 2 ]; then
              echo "Terraform apply attempt ${attempt} failed; retrying in 20s..."
              sleep 20
            fi
          done
          echo "::error title=Terraform apply failed::terraform apply (staging) failed on both attempts."
          exit 1

      - name: Capture Terraform outputs
        id: tf-outputs
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "gke_enabled=$(terraform output -raw gke_enabled)" >> "$GITHUB_OUTPUT"
          echo "gke_cluster_name=$(terraform output -raw gke_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "cloud_run_api_url=$(terraform output -raw cloud_run_api_url)" >> "$GITHUB_OUTPUT"
          echo "cloud_run_web_url=$(terraform output -raw cloud_run_web_url)" >> "$GITHUB_OUTPUT"
          echo "ar_repo=$(terraform output -raw artifact_registry_repo)" >> "$GITHUB_OUTPUT"
          echo "otel_mirror_repo=$(terraform output -raw otel_collector_mirror_repo)" >> "$GITHUB_OUTPUT"
          echo "kms_key_name=$(terraform output -raw kms_key_name)" >> "$GITHUB_OUTPUT"
          echo "api_wi_sa=$(terraform output -raw cicd_service_account_email)" >> "$GITHUB_OUTPUT"
          echo "web_workload_sa=$(terraform output -raw web_workload_sa)" >> "$GITHUB_OUTPUT"

  # ── 2. Build and push Docker images ─────────────────────────────────────
  build-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [preflight, terraform-staging]
    # Run when preflight succeeds and terraform-staging either succeeded or was skipped.
    if: |
      always() &&
      needs.preflight.result == 'success' &&
      (needs.terraform-staging.result == 'success' || needs.terraform-staging.result == 'skipped')
    permissions:
      contents: read
      id-token: write
    outputs:
      ar_repo: ${{ steps.ar.outputs.repo }}

    steps:
      - uses: actions/checkout@v5

      # In staging mode, Artifact Registry lives in the staging project.
      - name: Authenticate to GCP (staging)
        if: needs.preflight.outputs.staging_enabled == 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_STAGING_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_STAGING_SERVICE_ACCOUNT }}

      # In production-only mode, use production credentials for the prod AR repo.
      - name: Authenticate to GCP (production-only mode)
        if: needs.preflight.outputs.staging_enabled != 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_PROD_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_PROD_SERVICE_ACCOUNT }}

      - name: Resolve Artifact Registry repo
        id: ar
        run: |
          STAGING_REPO="${{ needs.terraform-staging.outputs.ar_repo }}"
          PREFLIGHT_REPO="${{ needs.preflight.outputs.ar_repo }}"
          echo "repo=${STAGING_REPO:-$PREFLIGHT_REPO}" >> "$GITHUB_OUTPUT"

      # No per-env value resolution for the web image (#396 / ADR-028, superseding
      # ADR-025). Public config (API URL, Clerk publishable key, default program) is
      # injected at RUNTIME by the deploy step's --set-env-vars / --update-secrets and
      # read by the root layout at request time — it is no longer inlined into the JS
      # bundle at build time, so the web image builds ONCE and promotes everywhere.
      #
      # Auth context invariant: credentials must be capable of pushing to
      # steps.ar.outputs.repo. The job-header auth already satisfies this (staging in
      # staging-enabled mode, prod in production-only mode) and is not swapped before
      # the build/push below; the prod-AR build-push block (#397) re-auths to prod itself.
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Bounded retry (Wandalen/wretry.action, pinned to v3.8.0 SHA) wraps the
      # build+push to absorb transient Artifact Registry 504s on layer-blob
      # push — the dominant real CI red-run driver per the #498 diagnosis
      # (docs/runbooks/staging-ci-flakiness.md), applied here for prod parity
      # (#504). Cached layers make a push-retry cheap. The wrapped
      # docker/build-push-action@v6 config is unchanged; tags are
      # comma-separated to keep wretry's forwarded `with` a flat parse.
      - name: Build and push API image
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea  # v3.8.0
        with:
          action: docker/build-push-action@v6
          attempt_limit: 3
          attempt_delay: 15000
          # Per-image cache scope (#407): isolates the API build cache from any
          # other image flavor so a stale layer in one cannot poison another.
          # `-v2` suffix forces a one-time miss on merge.
          with: |
            context: .
            file: apps/api/Dockerfile
            push: true
            tags: ${{ steps.ar.outputs.repo }}/api:${{ github.sha }},${{ steps.ar.outputs.repo }}/api:latest
            build-args: |
              GIT_SHA=${{ github.sha }}
            cache-from: type=gha,scope=api-deploy-v2
            cache-to: type=gha,scope=api-deploy-v2,mode=max

      # ── Web image: single build, promote-everywhere (#396 / ADR-028) ───────
      # One env-agnostic build (no NEXT_PUBLIC_*-style build-args for public
      # config — that's injected at runtime, see the deploy steps below). The
      # same artifact is exercised by the staging gate and deployed to
      # production — restoring the build-once / promote-everywhere contract
      # that ADR-025's per-env builds broke. Pushed to the same AR repo as the
      # API image (steps.ar.outputs.repo). GIT_SHA IS passed as a build-arg
      # (#671): unlike NEXT_PUBLIC_*/public config, it's a build-invariant
      # fact (same commit regardless of destination), so baking it in doesn't
      # reopen the per-environment-build problem ADR-028 fixed.
      - name: Build and push web image
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea  # v3.8.0
        with:
          action: docker/build-push-action@v6
          attempt_limit: 3
          attempt_delay: 15000
          # Single web cache scope (#407). The `-v3` suffix forces a one-time miss
          # on merge, retiring the now-removed per-env `web-staging-v2` /
          # `web-prod-v2` scopes.
          with: |
            context: .
            file: apps/web/Dockerfile
            push: true
            tags: ${{ steps.ar.outputs.repo }}/web:${{ github.sha }},${{ steps.ar.outputs.repo }}/web:latest
            build-args: |
              GIT_SHA=${{ github.sha }}
            cache-from: type=gha,scope=web-deploy-v3
            cache-to: type=gha,scope=web-deploy-v3,mode=max

      # ── Push images to the production AR directly (#397) ───────────────────
      # In staging-enabled mode the build/push steps above resolve
      # steps.ar.outputs.repo to the *staging* AR, so api:<sha> and web:<sha>
      # currently live only in the staging registry. `deploy-production` pulls
      # from the prod AR (steps.tf-prod.outputs.ar_repo) and would 404.
      #
      # Rather than copy staging-AR → prod-AR with `docker buildx imagetools
      # create` — which *reads* the source manifest from the staging AR while
      # authenticated as the prod SA and therefore required a cross-project
      # `roles/artifactregistry.reader` grant (the old #411 arrangement) — we
      # re-auth to prod and build+push each image straight to the prod AR. Every
      # push *writes* only its own project's AR with that project's own SA; the
      # prod SA never touches the staging AR, so the cross-project grant is gone
      # (removed from infra/terraform, see ADR-029). Because the staging build
      # above already exported the GHA layer cache (mode=max), each prod build is
      # a cache-resolve + push — no real rebuild.
      #
      # Guarded by staging_enabled because production-only mode already pushed
      # directly to the prod AR (steps.ar.outputs.repo resolves to prod there).

      - name: Resolve production AR repo
        id: ar-prod
        if: needs.preflight.outputs.staging_enabled == 'true'
        run: |
          echo "repo=${{ env.REGISTRY }}/${{ vars.GCP_PROD_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP (production, for prod-AR push)
        if: needs.preflight.outputs.staging_enabled == 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_PROD_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_PROD_SERVICE_ACCOUNT }}

      - name: Configure Docker for prod AR
        if: needs.preflight.outputs.staging_enabled == 'true'
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # Same wretry-wrapped build-push as the staging push above (3× bounded
      # retry absorbs transient AR 504s — #498 / #504), reusing the same per-
      # image GHA cache scope so this resolves entirely from cache and only
      # uploads the manifest/layers to the prod AR. No `cache-to`: the staging
      # build already exported the cache (mode=max); re-exporting here is wasted
      # work and can race the staging export.
      - name: Build and push API image to prod AR
        if: needs.preflight.outputs.staging_enabled == 'true'
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea  # v3.8.0
        with:
          action: docker/build-push-action@v6
          attempt_limit: 3
          attempt_delay: 15000
          with: |
            context: .
            file: apps/api/Dockerfile
            push: true
            tags: ${{ steps.ar-prod.outputs.repo }}/api:${{ github.sha }},${{ steps.ar-prod.outputs.repo }}/api:latest
            build-args: |
              GIT_SHA=${{ github.sha }}
            cache-from: type=gha,scope=api-deploy-v2

      - name: Build and push web image to prod AR
        if: needs.preflight.outputs.staging_enabled == 'true'
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea  # v3.8.0
        with:
          action: docker/build-push-action@v6
          attempt_limit: 3
          attempt_delay: 15000
          with: |
            context: .
            file: apps/web/Dockerfile
            push: true
            tags: ${{ steps.ar-prod.outputs.repo }}/web:${{ github.sha }},${{ steps.ar-prod.outputs.repo }}/web:latest
            build-args: |
              GIT_SHA=${{ github.sha }}
            cache-from: type=gha,scope=web-deploy-v3

      # Auth context invariant: build-images now ends with the prod CI/CD SA
      # active (the auth swap above for the prod-AR build-push is not restored).
      # Any step appended after this point that needs staging-AR or staging-
      # project credentials must re-auth to staging first (see the existing
      # restore pattern at the start of the API/web push block above). The
      # `staging_enabled == 'true'` guard does not save you — production-only
      # mode skips the entire prod-AR push block and leaves the staging auth from
      # the job header active, so a forgotten re-auth will silently flip behavior
      # between the two modes.

  # ── 3. Deploy to staging ─────────────────────────────────────────────────
  deploy-staging:
    name: Deploy (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [preflight, terraform-staging, build-images]
    if: needs.preflight.outputs.staging_enabled == 'true' && needs.build-images.result == 'success'
    permissions:
      contents: read
      id-token: write
    environment: staging

    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to GCP (staging)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_STAGING_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_STAGING_SERVICE_ACCOUNT }}

      # ── Database migrations (ADR-027) ──────────────────────────────────────
      # Mirror of the production migration step (see deploy-production). Applies
      # pending migrations to the staging DB before the API revision goes live so
      # staging exercises the same migrate path as prod rather than relying on
      # Terraform re-provisioning to mask drift (#460).
      - name: Run database migrations (staging)
        run: |
          gcloud run jobs update lifting-logbook-stg-migrate \
            --image="${{ needs.build-images.outputs.ar_repo }}/api:${{ github.sha }}" \
            --region="${{ env.REGION }}" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}" \
            --quiet
          gcloud run jobs execute lifting-logbook-stg-migrate \
            --region="${{ env.REGION }}" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}" \
            --wait

      # GKE-only steps below are skipped when terraform var enable_gke = false
      # (single-user / Cloud-Run-only deployments).
      - name: Set up GKE credentials
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ needs.terraform-staging.outputs.gke_cluster_name }}
          location: ${{ env.REGION }}
          project_id: ${{ vars.GCP_STAGING_PROJECT_ID }}

      - name: Set up Helm
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        uses: azure/setup-helm@v4

      - name: Ensure staging namespace
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        run: kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f -

      # Sync secrets from Secret Manager → Kubernetes Secrets
      - name: Sync API secrets to Kubernetes
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        run: |
          DB_URL=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-stg-database-url" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}")
          # system-database-url is no longer synced into the cluster Secret (#534):
          # the owner/superuser cred is unused on the runtime Prisma path, so it is
          # kept out of the GKE runtime surface entirely, not just the pod env.
          CLERK_KEY=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-stg-clerk-secret-key" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}")
          kubectl create secret generic api-secrets \
            --namespace=staging \
            --from-literal=database-url="$DB_URL" \
            --from-literal=clerk-secret-key="$CLERK_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Sync web secrets to Kubernetes
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        run: |
          CLERK_PUB=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-stg-clerk-publishable-key" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}")
          [ -n "$CLERK_PUB" ] || { echo "ERROR: clerk-publishable-key fetch returned empty (staging)"; exit 1; }
          CLERK_KEY=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-stg-clerk-secret-key" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}")
          [ -n "$CLERK_KEY" ] || { echo "ERROR: clerk-secret-key fetch returned empty (staging)"; exit 1; }
          kubectl create secret generic web-secrets \
            --namespace=staging \
            --from-literal=clerk-publishable-key="$CLERK_PUB" \
            --from-literal=clerk-secret-key="$CLERK_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

      # Same stuck-release self-heal as the web release below (#539), for the api release.
      - name: Rollback stuck Helm API release (GKE staging)
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        run: |
          STATUS=$(helm status api --namespace=staging --output=json 2>/dev/null \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['status'])" 2>/dev/null || echo "not-found")
          if [[ "$STATUS" == "pending-upgrade" || "$STATUS" == "pending-install" || "$STATUS" == "pending-rollback" ]]; then
            echo "Rolling back stuck release: api (status=$STATUS)"
            helm rollback api --namespace=staging || true
          fi
          # Pods carry `app: <fullname>` (chart sets fullnameOverride: "api"), not the
          # app.kubernetes.io/* labels — select on app=api or this find-and-delete is a no-op.
          kubectl get pods -n staging -l app=api -o json 2>/dev/null \
            | python3 -c "import sys,json; [print(p['metadata']['name']) for p in json.load(sys.stdin).get('items',[]) if p.get('metadata',{}).get('deletionTimestamp')]" \
            | xargs -r kubectl delete pod --force --grace-period=0 -n staging || true

      - name: Helm deploy API (GKE staging)
        id: helm-deploy-api
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        # GKE is the optional 10%-traffic A/B target (ADR-009); Cloud Run below is the
        # real serving path. A GKE rollout problem must never fail this job — that would
        # skip smoke-test and the (Cloud-Run-only) production gate. Matches staging.yml.
        continue-on-error: true
        run: |
          helm upgrade --install api ./infra/kubernetes/charts/api \
            --namespace=staging \
            --values=infra/kubernetes/values/staging-api.yaml \
            --set image.repository="${{ needs.build-images.outputs.ar_repo }}/api" \
            --set image.tag="${{ github.sha }}" \
            --set gcp.projectId="${{ vars.GCP_STAGING_PROJECT_ID }}" \
            --set gcp.kmsKeyName="${{ needs.terraform-staging.outputs.kms_key_name }}" \
            --set gcp.serviceAccountEmail="${{ needs.terraform-staging.outputs.api_wi_sa }}" \
            --set env.NODE_ENV=staging \
            --wait --timeout=10m --force

      - name: Fetch GKE API pod logs on failure
        if: steps.helm-deploy-api.outcome == 'failure'
        run: |
          echo "=== GKE API pod status ==="
          kubectl get pods -n staging -l app=api 2>&1 || true
          POD=$(kubectl get pods -n staging -l app=api \
            --sort-by=.metadata.creationTimestamp \
            -o jsonpath='{.items[-1].metadata.name}' 2>/dev/null || true)
          if [[ -n "$POD" ]]; then
            echo "=== Logs for pod: $POD ==="
            kubectl logs -n staging "$POD" --tail=100 2>&1 || true
            echo "=== Events for pod: $POD ==="
            kubectl describe pod -n staging "$POD" 2>&1 | tail -40 || true
          else
            echo "No API pod found — Helm may have failed before pod creation"
          fi

      # A prior run can leave the `web` Helm release wedged in a pending-* state with a
      # pod stuck in "Pending termination", which makes the next `helm upgrade --wait`
      # deadline out (#539). Roll back a stuck release and force-delete any
      # terminating pods first so the deploy below can proceed. Ported from staging.yml.
      - name: Rollback stuck Helm web release (GKE staging)
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        run: |
          STATUS=$(helm status web --namespace=staging --output=json 2>/dev/null \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['status'])" 2>/dev/null || echo "not-found")
          if [[ "$STATUS" == "pending-upgrade" || "$STATUS" == "pending-install" || "$STATUS" == "pending-rollback" ]]; then
            echo "Rolling back stuck release: web (status=$STATUS)"
            helm rollback web --namespace=staging || true
          fi
          # Pods carry `app: <fullname>` (chart sets fullnameOverride: "web"), not the
          # app.kubernetes.io/* labels — select on app=web or this find-and-delete is a no-op.
          kubectl get pods -n staging -l app=web -o json 2>/dev/null \
            | python3 -c "import sys,json; [print(p['metadata']['name']) for p in json.load(sys.stdin).get('items',[]) if p.get('metadata',{}).get('deletionTimestamp')]" \
            | xargs -r kubectl delete pod --force --grace-period=0 -n staging || true

      - name: Helm deploy web (GKE staging)
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        # Optional A/B target (see "Helm deploy API" above) — never gate the job on it.
        continue-on-error: true
        run: |
          # API_URL is the cluster-internal endpoint for server-side calls; PUBLIC_API_URL
          # is the browser-facing (external) endpoint injected into window.__PUBLIC_CONFIG__
          # at runtime (#396 / ADR-028). The browser cannot reach the in-cluster service,
          # so it uses the public Cloud Run API URL — the same value the build-time
          # NEXT_PUBLIC_API_URL carried before this refactor.
          API_CLUSTER_URL="http://api.staging.svc.cluster.local:3000"
          helm upgrade --install web ./infra/kubernetes/charts/web \
            --namespace=staging \
            --values=infra/kubernetes/values/staging-web.yaml \
            --set image.repository="${{ needs.build-images.outputs.ar_repo }}/web" \
            --set image.tag="${{ github.sha }}" \
            --set gcp.projectId="${{ vars.GCP_STAGING_PROJECT_ID }}" \
            --set env.NODE_ENV=staging \
            --set env.API_URL="$API_CLUSTER_URL" \
            --set env.PUBLIC_API_URL="${{ needs.terraform-staging.outputs.cloud_run_api_url }}" \
            --wait --timeout=10m

      # Cloud Run: A/B comparison target (10% traffic — ADR-009)
      - name: Deploy API + OTel Collector sidecar to Cloud Run (staging)
        run: |
          # Wire the API into Grafana Cloud via a co-located otel-collector sidecar (#768).
          # Cloud Run has no additive sidecar command and no ConfigMap volumes, and the api
          # service is lifecycle.ignore_changes = [template] (Terraform never mutates the
          # running revision), so the whole 2-container topology is owned here:
          #   1. Ensure the collector config.yaml secret (non-sensitive; from the repo file;
          #      a new version only when the content changed, to avoid per-deploy churn).
          #   2. Describe the live service, inject the sidecar (+ the api's
          #      OTEL_EXPORTER_OTLP_ENDPOINT; minus the unused SYSTEM_DATABASE_URL, #534), and
          #      `gcloud run services replace`.
          # Deriving the manifest from the live service preserves every Terraform-managed
          # field (VPC connector, scaling, SA, startup probe) verbatim. `services replace`
          # deliberately never touches the invoker IAM policy, so the api's public posture
          # stays owned solely by Terraform's allUsers run.invoker binding
          # (google_cloud_run_v2_service_iam_member.api_public, #766/#770) — unlike the prior
          # `gcloud run deploy --allow-unauthenticated`, this neither re-asserts nor fights
          # that grant. `--container` was rejected (unresolvable sidecar port catch-22) — see
          # scripts/inject-otel-sidecar.py. The sidecar shares the api revision's CPU-throttling,
          # so its batch/export timers are best-effort between requests, not always-on like the
          # GKE DaemonSet (see ADR-018).
          # Grafana OTLP/Loki endpoints come from the single source of truth
          # (infra/observability/grafana-endpoints.env, #785); sourcing it exports
          # OTEL_OTLP_ENDPOINT / OTEL_LOKI_ENDPOINT for the injector below.
          source infra/observability/grafana-endpoints.env
          source infra/observability/otel-collector-image.env
          PROJECT="${{ vars.GCP_STAGING_PROJECT_ID }}"
          CONFIG_SECRET="lifting-logbook-stg-otel-collector-config"
          gcloud secrets describe "$CONFIG_SECRET" --project="$PROJECT" >/dev/null 2>&1 \
            || gcloud secrets create "$CONFIG_SECRET" --replication-policy=automatic --project="$PROJECT" --quiet
          CURRENT_CFG=$(gcloud secrets versions access latest --secret="$CONFIG_SECRET" --project="$PROJECT" 2>/dev/null || true)
          if [ "$CURRENT_CFG" != "$(cat infra/cloud-run/otel-collector-config.yaml)" ]; then
            gcloud secrets versions add "$CONFIG_SECRET" --data-file=infra/cloud-run/otel-collector-config.yaml --project="$PROJECT" --quiet
            echo "otel-collector config secret: new version published."
          else
            echo "otel-collector config secret: unchanged."
          fi
          # PyYAML ships pre-installed on GitHub-hosted ubuntu runners; --break-system-packages
          # keeps the fallback working if it is ever absent on a PEP-668 (externally-managed) runner.
          python3 -c "import yaml" 2>/dev/null || python3 -m pip install --quiet --break-system-packages pyyaml
          gcloud run services describe lifting-logbook-stg-api \
            --region="${{ env.REGION }}" --project="$PROJECT" --format=export > "$RUNNER_TEMP/stg-api.yaml"
          API_IMAGE="${{ needs.build-images.outputs.ar_repo }}/api:${{ github.sha }}" \
          OTEL_CONFIG_SECRET="$CONFIG_SECRET" \
          COLLECTOR_IMAGE="${{ needs.terraform-staging.outputs.otel_mirror_repo }}/${OTEL_COLLECTOR_IMAGE_REPO_PATH}@${OTEL_COLLECTOR_IMAGE_DIGEST}" \
          OTEL_OTLP_SECRET="lifting-logbook-stg-otel-otlp-auth-header" \
          OTEL_LOKI_SECRET="lifting-logbook-stg-otel-loki-auth-header" \
            python3 scripts/inject-otel-sidecar.py "$RUNNER_TEMP/stg-api.yaml" > "$RUNNER_TEMP/stg-api-sidecar.yaml"
          gcloud run services replace "$RUNNER_TEMP/stg-api-sidecar.yaml" \
            --region="${{ env.REGION }}" --project="$PROJECT" --quiet

      - name: Deploy web to Cloud Run (staging)
        run: |
          # Runtime public-config injection (#396 / ADR-028): the env-agnostic web:<sha>
          # image is configured here, not at build. On Cloud Run the browser reaches the
          # same external API URL as the server, so PUBLIC_API_URL == API_URL. The Clerk
          # publishable key is now a runtime secret env (read by the root layout and passed
          # to <ClerkProvider> as a prop), alongside the existing CLERK_SECRET_KEY.
          gcloud run deploy lifting-logbook-stg-web \
            --image="${{ needs.build-images.outputs.ar_repo }}/web:${{ github.sha }}" \
            --region="${{ env.REGION }}" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}" \
            --platform=managed \
            --allow-unauthenticated \
            --service-account="${{ needs.terraform-staging.outputs.web_workload_sa }}" \
            --set-env-vars="API_URL=${{ needs.terraform-staging.outputs.cloud_run_api_url }},PUBLIC_API_URL=${{ needs.terraform-staging.outputs.cloud_run_api_url }}" \
            --update-secrets="CLERK_SECRET_KEY=lifting-logbook-stg-clerk-secret-key:latest,CLERK_PUBLISHABLE_KEY=lifting-logbook-stg-clerk-publishable-key:latest" \
            --quiet

      # ── OTel Collector (observability — #474) ──────────────────────────────
      # Deployed LAST in the job, after the Cloud Run app deploys above, so an
      # observability rollout problem cannot block app delivery — telemetry must
      # never gate serving traffic. Sync the Grafana Cloud auth headers from Secret
      # Manager into the otel-collector-secrets k8s Secret (keys consumed by the
      # chart's daemonset.yaml secretKeyRef), then deploy the collector DaemonSet.
      # Without this the collector has no credentials and traces/logs/metrics never
      # leave the cluster. The secrets are created + populated by
      # scripts/bootstrap-otel-secrets.sh (not Terraform — see docs/deploy.md). The
      # guards fail the deploy loudly if either secret is absent or empty, and never
      # echo the value, so no token reaches CI logs.
      - name: Sync otel-collector secrets to Kubernetes
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        run: |
          OTLP_H=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-stg-otel-otlp-auth-header" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}")
          [ -n "$OTLP_H" ] || { echo "ERROR: otel otlp-auth-header unpopulated (staging) — run the Grafana token bootstrap in docs/deploy.md"; exit 1; }
          LOKI_H=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-stg-otel-loki-auth-header" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}")
          [ -n "$LOKI_H" ] || { echo "ERROR: otel loki-auth-header unpopulated (staging) — run the Grafana token bootstrap in docs/deploy.md"; exit 1; }
          kubectl create secret generic otel-collector-secrets \
            --namespace=staging \
            --from-literal=otlp-auth-header="$OTLP_H" \
            --from-literal=loki-auth-header="$LOKI_H" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm deploy otel-collector (GKE staging)
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        # Telemetry must never gate serving traffic (see the OTel section header above).
        continue-on-error: true
        run: |
          source infra/observability/grafana-endpoints.env
          source infra/observability/otel-collector-image.env
          helm upgrade --install otel-collector ./infra/kubernetes/charts/otel-collector \
            --namespace=staging \
            --values=infra/kubernetes/values/staging-otel-collector.yaml \
            --set-string env.OTEL_COLLECTOR_OTLP_ENDPOINT="$OTEL_OTLP_ENDPOINT" \
            --set-string env.OTEL_COLLECTOR_LOKI_ENDPOINT="$OTEL_LOKI_ENDPOINT" \
            --set-string image.repository="${{ needs.terraform-staging.outputs.otel_mirror_repo }}/${OTEL_COLLECTOR_IMAGE_REPO_PATH}" \
            --set-string image.digest="${OTEL_COLLECTOR_IMAGE_DIGEST}" \
            --wait --timeout=5m

  # ── 4. Smoke test staging ────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [preflight, deploy-staging, terraform-staging]
    if: needs.preflight.outputs.staging_enabled == 'true' && needs.deploy-staging.result == 'success'

    steps:
      # Two-probe staging smoke (#402, renamed /healthz → /livez in #409).
      # One probe owned by app code (/livez), one by the user-facing auth
      # flow (/sign-in). They distinguish three failure modes that a single
      # `/` probe collapsed into "404":
      #   /livez 200, /sign-in 200 → safe to promote
      #   /livez 200, /sign-in non-200 → Clerk middleware misconfigured
      #   /livez non-200 → Next.js runtime not booting
      # /livez is excluded from clerkMiddleware's matcher; /sign-in is
      # auth-public via createRouteMatcher.
      #
      # Probe path is /livez (Kubernetes liveness convention), NOT /healthz —
      # Google Frontend on Cloud Run intercepts /healthz before requests reach
      # the container, returning Google's branded 404 page even when the
      # in-image route is correct. /livez, /readyz, /health, and other
      # sibling paths pass through to Next.js normally. See #409 for the
      # full diagnostic chain.
      - name: Smoke test Cloud Run staging — /livez (web runtime)
        run: |
          # %/ strips a trailing slash so $BASE_URL/livez never becomes
          # https://.../livez double-slashed (#405 review finding).
          BASE_URL="${{ needs.terraform-staging.outputs.cloud_run_web_url }}"
          BASE_URL="${BASE_URL%/}"
          # Allow up to 3 minutes for Cloud Run to become healthy
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/livez" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Staging /livez returned 200 — OK"
              exit 0
            fi
            echo "/livez attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Staging /livez smoke FAILED — Next.js runtime not serving 200 (probe owned by app code, distinct from Clerk auth flow)" && exit 1

      - name: Smoke test Cloud Run staging — /sign-in (Clerk auth flow)
        run: |
          BASE_URL="${{ needs.terraform-staging.outputs.cloud_run_web_url }}"
          BASE_URL="${BASE_URL%/}"
          # The runtime is already up (/livez succeeded immediately before this
          # step). /sign-in should respond within seconds, not minutes — if Clerk
          # middleware can't serve 200 in 60s the failure mode this PR is designed
          # to surface has occurred, and fast failure improves operator turnaround.
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/sign-in" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Staging /sign-in returned 200 — OK"
              exit 0
            fi
            echo "/sign-in attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Staging /sign-in smoke FAILED — runtime healthy but Clerk auth flow not serving 200 (check middleware matcher and Clerk env vars)" && exit 1

      - name: Smoke test Cloud Run staging (API auth check)
        run: |
          # API requires Cloud Run IAM auth — a 403 confirms it is up and rejecting
          # unauthenticated requests correctly. A 200 is also acceptable (e.g., if
          # service-to-service auth is later wired up via a service account).
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ needs.terraform-staging.outputs.cloud_run_api_url }}/health")
          if [ "$STATUS" = "403" ] || [ "$STATUS" = "200" ]; then
            echo "API smoke test passed (status=$STATUS)"
          else
            echo "API smoke test failed: expected 200 or 403, got $STATUS" && exit 1
          fi

  # ── 4b. Plan production (read-only — surfaces the prod blast radius) ─────
  # Runs `terraform plan` against the PRODUCTION workspace and writes the
  # add/change/destroy counts + resource addresses to the run's job summary,
  # BEFORE the gated deploy-production job. This closes the "context-free
  # one-click approval" gap that let the RLS prod cutover (#517) apply unseen on
  # 2026-06-15: an unrelated CI-fix merge (#540) made deploy-production reachable
  # and a single approval applied a dormant prod-affecting Terraform diff (#533)
  # whose blast radius was invisible at the gate. See #542.
  #
  # Safety: `terraform plan` is READ-ONLY — it refreshes state via GCP APIs and
  # computes a diff; it cannot mutate prod even on failure. Un-gated (no
  # `environment:`) so it never prompts and always runs ahead of the gate. Prod
  # WIF creds are exposed only here on `push: main` (deploy.yml's sole trigger),
  # never on untrusted PR runs — there is no `pull_request` trigger. No secret is
  # echoed; only non-sensitive counts + resource addresses reach the summary.
  plan-production:
    name: Plan (production)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [preflight, build-images]
    # Mirror deploy-production's readiness: run whenever build-images succeeded,
    # in both staging-enabled and production-only modes (always() tolerates the
    # skipped staging chain).
    if: always() && needs.build-images.result == 'success'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to GCP (production)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_PROD_WORKLOAD_IDENTITY_PROVIDER }}
          # Least-privilege read-only identity for the advisory plan (#545): viewer
          # + secretmanager.secretAccessor + storage.objectViewer on the state bucket
          # — no write/apply/setIamPolicy. The write-capable GCP_PROD_SERVICE_ACCOUNT
          # is used only by deploy-production's gated apply.
          service_account: ${{ secrets.GCP_PROD_PLAN_SERVICE_ACCOUNT }}

      - name: Terraform setup + init (production)
        uses: ./.github/actions/tf-init
        with:
          workspace: production
          state-bucket: ${{ secrets.TF_STATE_BUCKET }}

      - name: Note setup/init failure in the run summary
        if: failure()
        # plan-production is advisory: even when setup/init fails, the approver
        # must get a heading + note in the run summary (never a silently-empty
        # one) before reaching the gate (#544 review). tf-init still exits 1, so
        # the job ends red — advisory to the deploy (deploy-production's `if:`
        # does not reference plan-production).
        run: |
          {
            echo "## Production Terraform plan (read-only — review before approving)"
            echo ""
            echo ":warning: \`terraform setup/init (production)\` failed — no blast-radius summary is available for this run."
            echo "This is advisory and does **not** block \`deploy-production\`. Inspect the \"Terraform init (production)\" step log, and review the apply output during the gated deploy before approving."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Terraform plan (production)
        working-directory: ${{ env.TF_DIR }}
        # Read-only plan against the production workspace. Bounded retry absorbs
        # transient GCP 5xx during the refresh phase (same driver as the apply
        # retries — #498 / #504). On success the plan output is parsed and the
        # add/change/destroy summary + resource addresses are written to the run
        # summary so the approver can read the prod blast radius before approving
        # (#542). Never echoes a secret; -input=false avoids any prompt hang.
        # -lock=false: the read-only plan SA (#545) has no state-bucket write, so it
        # cannot acquire the .tflock. plan-production runs early (needs build-images
        # only) with no concurrent prod-state writer, so skipping the advisory lock
        # is safe and keeps the identity strictly read-only.
        run: |
          PLAN_OUT="$RUNNER_TEMP/prod-plan.txt"
          PLANNED=0
          for attempt in 1 2; do
            if terraform plan -no-color -input=false -lock=false \
                 -var-file=terraform.tfvars.production \
                 -var="billing_account=${{ secrets.GCP_BILLING_ACCOUNT }}" \
                 > "$PLAN_OUT" 2>&1; then
              PLANNED=1
              break
            fi
            if [ "${attempt}" -lt 2 ]; then
              echo "Terraform plan attempt ${attempt} failed; retrying in 20s..."
              sleep 20
            fi
          done

          {
            echo "## Production Terraform plan (read-only — review before approving)"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$PLANNED" -ne 1 ]; then
            {
              echo ":warning: \`terraform plan (production)\` failed on both attempts — no blast-radius summary is available for this run."
              echo "This is advisory and does **not** block \`deploy-production\`. Inspect the \"Terraform plan (production)\" step log, and review the apply output during the gated deploy before approving."
            } >> "$GITHUB_STEP_SUMMARY"
            # Surface the tail of the failure for quick triage, then stop here
            # without failing the job (advisory by design — see job header).
            echo "::warning title=Prod plan unavailable::terraform plan (production) failed; deploy-production is unaffected (advisory)."
            tail -n 30 "$PLAN_OUT" || true
            exit 0
          fi

          # `Plan: N to add, N to change, N to destroy.` — present only when the
          # plan is non-empty; "No changes" otherwise.
          SUMMARY_LINE=$(grep -E '^Plan: [0-9]+ to add' "$PLAN_OUT" | tail -n 1 || true)
          {
            if [ -n "$SUMMARY_LINE" ]; then
              echo "**${SUMMARY_LINE}**"
              echo ""
              echo ":rotating_light: This plan is **non-empty** — approving the \`production\` gate will \`terraform apply\` these changes to prod. A prod-affecting Terraform diff can ride in on an unrelated merge (the #542 / #517 incident). Confirm every address below is intended before approving."
              echo ""
              echo "<details><summary>Resource addresses</summary>"
              echo ""
              echo '```'
              grep -E '^  # ' "$PLAN_OUT" || echo "(plan reported changes but no resource-address lines were parsed — read the full step log)"
              echo '```'
              echo ""
              echo "</details>"
            else
              echo "**No changes.** The production Terraform state already matches \`main\`; approving will apply no infra changes."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ── 5. Deploy to production (requires manual approval) ───────────────────
  # The `environment: production` reference below is the manual approval gate.
  # GitHub raises one required-reviewer prompt per job that targets a protected
  # environment, so the gate lives on this job alone — the job that actually
  # deploys — giving a single approval, the GitHub-enforced backstop on the
  # real deploy, and an accurate deployment record against the production
  # environment.
  #
  # History: a separate `approve-production` job previously carried this
  # environment "in addition to" deploy-production (#417), on the assumption
  # that two jobs sharing one environment would prompt only once. They don't —
  # GitHub prompts per-job — which produced a double approval (#451). The gate
  # is now consolidated onto the deploy job, where the environment protection
  # belongs.
  deploy-production:
    name: Deploy (production)
    runs-on: ubuntu-latest
    # timeout-minutes bounds only execution time after the job starts running;
    # time spent waiting at the `environment: production` approval gate is
    # "waiting" status and does NOT count against it (#566).
    # Higher than deploy-staging's 30: this job does strictly more (secret
    # validation + `terraform apply` on top of the same migrate + 3× Helm
    # upgrade + Cloud Run) and, being human-gated and infrequent, has no
    # measured runtime to back a tighter bound — so it gets build-images-level
    # headroom to avoid a false-trip mid-prod-deploy, the costliest failure mode.
    timeout-minutes: 45
    # plan-production is a needs (not just an upstream job) so the production
    # approval gate does not prompt until the read-only prod plan summary exists
    # in the run — the approver always sees the blast radius before clicking
    # approve (#542). It is intentionally advisory: the `if:` below does NOT
    # require plan-production to succeed, so a transient plan failure removes the
    # summary for that run but never blocks the deploy.
    needs: [preflight, build-images, deploy-staging, smoke-test, plan-production]
    # Only deploy when the pipeline is actually ready: build succeeded and,
    # when staging is enabled, the staging smoke test passed. `always()` lets
    # this run even though deploy-staging/smoke-test are skipped in
    # production-only mode (their `skipped` result is not `success`).
    if: |
      always() &&
      needs.build-images.result == 'success' &&
      (
        needs.preflight.outputs.staging_enabled != 'true' ||
        needs.smoke-test.result == 'success'
      )
    # gh run list (used by the cancelled-run ancestry audit near the end of this job)
    # works with contents: read alone — see staging.yml's build-images job for the
    # identical working precedent. Do not add actions: read for it.
    permissions:
      contents: read
      id-token: write
    environment: production   # manual approval gate (required reviewer, #417)

    steps:
      - uses: actions/checkout@v5
        with:
          # Full history, not the default shallow depth-1 clone: the cancelled-run
          # ancestry audit below runs `git merge-base --is-ancestor` against SHAs
          # that can be many commits back, which a shallow clone can't resolve
          # reliably. This repo's entire history is ~400 commits, so the extra
          # clone cost is negligible against this job's 45-minute budget (#672).
          fetch-depth: 0

      - name: Authenticate to GCP (production)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_PROD_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_PROD_SERVICE_ACCOUNT }}

      # ── Pre-promote auth-secret validation (#490 item 2 / #382) ────────────
      # Fail fast BEFORE any production mutation (terraform apply, migrate, Cloud
      # Run / Helm deploy) if a serve-gating auth secret is absent or still the
      # Terraform placeholder. GCP Secret Manager is already the single source of
      # truth — every surface (Cloud Run --update-secrets, the k8s Secret sync,
      # the web runtime env) fetches from it rather than holding its own copy — so
      # the only failure mode left is "the source value was never populated".
      # #382 was exactly that: a missing prod clerk-secret-key, caught only after
      # the web service was already serving auth 500s in prod. This surfaces it at
      # promote time instead. It aggregates all failures (does not stop at the
      # first) and never echoes a secret value. Scope is the two auth secrets
      # whose absence breaks the served surface; the DB-url and OTel-header
      # secrets keep their own per-step `[ -n ]` guards later in the job.
      #
      # Error-message diligence (CLAUDE.md; the #395 transient-504 incident): a
      # non-zero gcloud exit is NOT assumed to mean "secret absent". stdout (the
      # secret) is captured to a shell var and stderr to a file, then the failure
      # is classified — only a NOT_FOUND error is reported as missing; anything
      # else is reported as "inaccessible (transient or IAM), re-run if transient".
      # The secret value itself never touches disk; only the error text does.
      - name: Validate production auth secrets (pre-promote)
        run: |
          MISSING=0
          ERR_FILE="$RUNNER_TEMP/secret_stderr"
          for SECRET in \
            lifting-logbook-prod-clerk-secret-key \
            lifting-logbook-prod-clerk-publishable-key; do
            if VALUE=$(gcloud secrets versions access latest \
              --secret="$SECRET" \
              --project="${{ vars.GCP_PROD_PROJECT_ID }}" 2>"$ERR_FILE"); then
              if [ -z "$VALUE" ]; then
                echo "::error title=Empty production secret::$SECRET resolved to an empty value. Set the real value in GCP Secret Manager (docs/deploy.md Step 4) before promoting."
                MISSING=1
              elif [ "$VALUE" = "REPLACE_ME" ]; then
                echo "::error title=Placeholder production secret::$SECRET is still the Terraform placeholder (REPLACE_ME). Set the real value in GCP Secret Manager (docs/deploy.md Step 4) before promoting."
                MISSING=1
              fi
            else
              ERR=$(cat "$ERR_FILE" 2>/dev/null || true)
              if printf '%s' "$ERR" | grep -qi "NOT_FOUND"; then
                echo "::error title=Missing production secret::$SECRET does not exist in GCP Secret Manager. Create and populate it (docs/deploy.md Step 4) before promoting."
              else
                echo "::error title=Production secret inaccessible::Could not read $SECRET — possibly a transient Secret Manager error or an IAM/permission problem, NOT necessarily a missing secret. Re-run if transient; otherwise verify the prod CI/CD service account's secretmanager.versions.access grant. Detail: $ERR"
              fi
              MISSING=1
            fi
          done
          rm -f "$ERR_FILE"
          if [ "$MISSING" -ne 0 ]; then
            echo "Production auth-secret preflight failed — aborting before any production mutation. See the errors above." >&2
            exit 1
          fi
          echo "Production auth secrets present and non-placeholder — proceeding."

      - name: Terraform setup + init (production)
        uses: ./.github/actions/tf-init
        with:
          workspace: production
          state-bucket: ${{ secrets.TF_STATE_BUCKET }}

      - name: Terraform apply (production)
        working-directory: ${{ env.TF_DIR }}
        # Bounded retry absorbs transient GCP API 5xx / eventual-consistency
        # during apply (the same real CI driver as staging — #498 / #504,
        # docs/runbooks/staging-ci-flakiness.md). A genuine config error
        # fails both attempts and hard-fails the prod deploy.
        run: |
          for attempt in 1 2; do
            if terraform apply -auto-approve \
                 -var-file=terraform.tfvars.production \
                 -var="billing_account=${{ secrets.GCP_BILLING_ACCOUNT }}"; then
              exit 0
            fi
            if [ "${attempt}" -lt 2 ]; then
              echo "Terraform apply attempt ${attempt} failed; retrying in 20s..."
              sleep 20
            fi
          done
          echo "::error title=Terraform apply failed::terraform apply (production) failed on both attempts."
          exit 1

      - name: Capture production Terraform outputs
        id: tf-prod
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "gke_enabled=$(terraform output -raw gke_enabled)" >> "$GITHUB_OUTPUT"
          echo "gke_cluster_name=$(terraform output -raw gke_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "cloud_run_api_url=$(terraform output -raw cloud_run_api_url)" >> "$GITHUB_OUTPUT"
          echo "cloud_run_web_url=$(terraform output -raw cloud_run_web_url)" >> "$GITHUB_OUTPUT"
          echo "ar_repo=$(terraform output -raw artifact_registry_repo)" >> "$GITHUB_OUTPUT"
          echo "otel_mirror_repo=$(terraform output -raw otel_collector_mirror_repo)" >> "$GITHUB_OUTPUT"
          echo "kms_key_name=$(terraform output -raw kms_key_name)" >> "$GITHUB_OUTPUT"
          echo "api_wi_sa=$(terraform output -raw cicd_service_account_email)" >> "$GITHUB_OUTPUT"
          echo "web_workload_sa=$(terraform output -raw web_workload_sa)" >> "$GITHUB_OUTPUT"

      # ── Database migrations (ADR-027) ──────────────────────────────────────
      # Apply pending Prisma migrations to the prod DB via an in-VPC Cloud Run
      # Job *before* the API revision goes live. The prod Cloud SQL instance has
      # a private IP only and is unreachable from this runner directly, so the
      # job (created by `Terraform apply (production)` above) runs inside the VPC
      # via the same connector the API uses. Terraform applies a placeholder
      # image, so set the real image, then execute and wait. `--wait` returns
      # non-zero if the migration (or the `migrate status` drift check baked into
      # the job) fails, which halts the deploy and leaves the last-good API
      # revision serving. This step is the systemic fix for #460: the pipeline
      # previously never ran `migrate deploy` against prod, so the schema drifted
      # silently until an endpoint hit a missing table and 500'd (#458).
      - name: Run database migrations (production)
        run: |
          gcloud run jobs update lifting-logbook-prod-migrate \
            --image="${{ steps.tf-prod.outputs.ar_repo }}/api:${{ github.sha }}" \
            --region="${{ env.REGION }}" \
            --project="${{ vars.GCP_PROD_PROJECT_ID }}" \
            --quiet
          gcloud run jobs execute lifting-logbook-prod-migrate \
            --region="${{ env.REGION }}" \
            --project="${{ vars.GCP_PROD_PROJECT_ID }}" \
            --wait

      # GKE-only steps below are skipped when terraform var enable_gke = false
      # (single-user / Cloud-Run-only deployments).
      - name: Set up GKE credentials (production)
        if: steps.tf-prod.outputs.gke_enabled == 'true'
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ steps.tf-prod.outputs.gke_cluster_name }}
          location: ${{ env.REGION }}
          project_id: ${{ vars.GCP_PROD_PROJECT_ID }}

      - name: Set up Helm
        if: steps.tf-prod.outputs.gke_enabled == 'true'
        uses: azure/setup-helm@v4

      - name: Ensure production namespace
        if: steps.tf-prod.outputs.gke_enabled == 'true'
        run: kubectl create namespace production --dry-run=client -o yaml | kubectl apply -f -

      - name: Sync API secrets to Kubernetes (production)
        if: steps.tf-prod.outputs.gke_enabled == 'true'
        run: |
          DB_URL=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-prod-database-url" \
            --project="${{ vars.GCP_PROD_PROJECT_ID }}")
          # system-database-url is no longer synced into the cluster Secret (#534) —
          # see the staging step. (Production is Cloud-Run-only / enable_gke=false, so
          # this step is normally skipped; cleaned up for consistency.)
          CLERK_KEY=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-prod-clerk-secret-key" \
            --project="${{ vars.GCP_PROD_PROJECT_ID }}")
          kubectl create secret generic api-secrets \
            --namespace=production \
            --from-literal=database-url="$DB_URL" \
            --from-literal=clerk-secret-key="$CLERK_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Sync web secrets to Kubernetes (production)
        if: steps.tf-prod.outputs.gke_enabled == 'true'
        run: |
          CLERK_PUB=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-prod-clerk-publishable-key" \
            --project="${{ vars.GCP_PROD_PROJECT_ID }}")
          [ -n "$CLERK_PUB" ] || { echo "ERROR: clerk-publishable-key fetch returned empty (production)"; exit 1; }
          CLERK_KEY=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-prod-clerk-secret-key" \
            --project="${{ vars.GCP_PROD_PROJECT_ID }}")
          [ -n "$CLERK_KEY" ] || { echo "ERROR: clerk-secret-key fetch returned empty (production)"; exit 1; }
          kubectl create secret generic web-secrets \
            --namespace=production \
            --from-literal=clerk-publishable-key="$CLERK_PUB" \
            --from-literal=clerk-secret-key="$CLERK_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm deploy API (GKE production)
        if: steps.tf-prod.outputs.gke_enabled == 'true'
        run: |
          helm upgrade --install api ./infra/kubernetes/charts/api \
            --namespace=production \
            --values=infra/kubernetes/values/production-api.yaml \
            --set image.repository="${{ steps.tf-prod.outputs.ar_repo }}/api" \
            --set image.tag="${{ github.sha }}" \
            --set gcp.projectId="${{ vars.GCP_PROD_PROJECT_ID }}" \
            --set gcp.kmsKeyName="${{ steps.tf-prod.outputs.kms_key_name }}" \
            --set gcp.serviceAccountEmail="${{ steps.tf-prod.outputs.api_wi_sa }}" \
            --set env.NODE_ENV=production \
            --wait --timeout=5m

      - name: Helm deploy web (GKE production)
        if: steps.tf-prod.outputs.gke_enabled == 'true'
        run: |
          # PUBLIC_API_URL = browser-facing (external) endpoint, injected at runtime
          # into window.__PUBLIC_CONFIG__; API_URL stays cluster-internal for SSR
          # calls (#396 / ADR-028).
          API_CLUSTER_URL="http://api.production.svc.cluster.local:3000"
          helm upgrade --install web ./infra/kubernetes/charts/web \
            --namespace=production \
            --values=infra/kubernetes/values/production-web.yaml \
            --set image.repository="${{ steps.tf-prod.outputs.ar_repo }}/web" \
            --set image.tag="${{ github.sha }}" \
            --set gcp.projectId="${{ vars.GCP_PROD_PROJECT_ID }}" \
            --set env.NODE_ENV=production \
            --set env.API_URL="$API_CLUSTER_URL" \
            --set env.PUBLIC_API_URL="${{ steps.tf-prod.outputs.cloud_run_api_url }}" \
            --wait --timeout=5m

      - name: Deploy API + OTel Collector sidecar to Cloud Run (production)
        run: |
          # Mirror of the staging step (see deploy-staging for the full rationale): wire the
          # API into Grafana Cloud via a co-located otel-collector sidecar (#768) by ensuring
          # the config.yaml secret, then describe → inject sidecar → `services replace`.
          # Deriving the manifest from the live service preserves every Terraform-managed
          # field verbatim. `services replace` never touches the invoker IAM policy, so the
          # api's public posture stays owned by Terraform's allUsers binding
          # (google_cloud_run_v2_service_iam_member.api_public, #766/#770), not re-asserted here.
          # The unused SYSTEM_DATABASE_URL (#534) is dropped by the injector. The sidecar shares
          # the api revision's CPU-throttling (best-effort flush between requests, not always-on
          # — see ADR-018). Grafana OTLP/Loki endpoints come from the single source
          # of truth (infra/observability/grafana-endpoints.env, #785); sourcing it
          # exports OTEL_OTLP_ENDPOINT / OTEL_LOKI_ENDPOINT for the injector below.
          source infra/observability/grafana-endpoints.env
          source infra/observability/otel-collector-image.env
          PROJECT="${{ vars.GCP_PROD_PROJECT_ID }}"
          CONFIG_SECRET="lifting-logbook-prod-otel-collector-config"
          gcloud secrets describe "$CONFIG_SECRET" --project="$PROJECT" >/dev/null 2>&1 \
            || gcloud secrets create "$CONFIG_SECRET" --replication-policy=automatic --project="$PROJECT" --quiet
          CURRENT_CFG=$(gcloud secrets versions access latest --secret="$CONFIG_SECRET" --project="$PROJECT" 2>/dev/null || true)
          if [ "$CURRENT_CFG" != "$(cat infra/cloud-run/otel-collector-config.yaml)" ]; then
            gcloud secrets versions add "$CONFIG_SECRET" --data-file=infra/cloud-run/otel-collector-config.yaml --project="$PROJECT" --quiet
            echo "otel-collector config secret: new version published."
          else
            echo "otel-collector config secret: unchanged."
          fi
          # PyYAML ships pre-installed on GitHub-hosted ubuntu runners; --break-system-packages
          # keeps the fallback working if it is ever absent on a PEP-668 (externally-managed) runner.
          python3 -c "import yaml" 2>/dev/null || python3 -m pip install --quiet --break-system-packages pyyaml
          gcloud run services describe lifting-logbook-prod-api \
            --region="${{ env.REGION }}" --project="$PROJECT" --format=export > "$RUNNER_TEMP/prod-api.yaml"
          API_IMAGE="${{ steps.tf-prod.outputs.ar_repo }}/api:${{ github.sha }}" \
          OTEL_CONFIG_SECRET="$CONFIG_SECRET" \
          COLLECTOR_IMAGE="${{ steps.tf-prod.outputs.otel_mirror_repo }}/${OTEL_COLLECTOR_IMAGE_REPO_PATH}@${OTEL_COLLECTOR_IMAGE_DIGEST}" \
          OTEL_OTLP_SECRET="lifting-logbook-prod-otel-otlp-auth-header" \
          OTEL_LOKI_SECRET="lifting-logbook-prod-otel-loki-auth-header" \
            python3 scripts/inject-otel-sidecar.py "$RUNNER_TEMP/prod-api.yaml" > "$RUNNER_TEMP/prod-api-sidecar.yaml"
          gcloud run services replace "$RUNNER_TEMP/prod-api-sidecar.yaml" \
            --region="${{ env.REGION }}" --project="$PROJECT" --quiet

      # ── Production DB-backed smoke test (#460) ─────────────────────────────
      # The migrate guard above prevents shipping against an unmigrated schema;
      # this verifies the *live* API can actually serve a database-backed
      # request after deploy — the failure class that left prod silently 500ing
      # in #458 (no prod smoke previously existed; the staging smoke never hit a
      # DB endpoint). /readyz is @Public (no Clerk) and runs `SELECT 1`, but the
      # API requires Cloud Run IAM auth, so mint an identity token for the
      # service URL (impersonation is required — WIF-federated creds cannot mint
      # ID tokens directly). A non-200 fails the deploy so it surfaces loudly
      # rather than days later. NOTE: this does not auto-roll-back the revision;
      # roll back manually on failure (docs/deploy.md) — automated rollback is a
      # tracked follow-up.
      - name: Smoke test Cloud Run production — /readyz (DB-backed)
        run: |
          API_URL="${{ steps.tf-prod.outputs.cloud_run_api_url }}"
          API_URL="${API_URL%/}"
          ID_TOKEN=$(gcloud auth print-identity-token \
            --impersonate-service-account="${{ secrets.GCP_PROD_SERVICE_ACCOUNT }}" \
            --audiences="$API_URL" \
            --include-email)
          [ -n "$ID_TOKEN" ] || { echo "ERROR: failed to mint Cloud Run identity token for $API_URL"; exit 1; }
          # Allow up to 2 minutes for the new revision to become ready.
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $ID_TOKEN" "$API_URL/readyz" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Production /readyz returned 200 — DB-backed readiness OK"
              exit 0
            fi
            echo "/readyz attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Production /readyz smoke FAILED — API is up but cannot serve DB-backed requests (check migrations, Cloud SQL connectivity, DATABASE_URL). Roll back the API revision per docs/deploy.md." && exit 1

      - name: Deploy web to Cloud Run (production)
        run: |
          # Runtime public-config injection (#396 / ADR-028): same env-agnostic web:<sha>
          # image as staging, configured per-env here. PUBLIC_API_URL == API_URL on Cloud
          # Run; CLERK_PUBLISHABLE_KEY is a runtime secret env consumed by the root layout.
          gcloud run deploy lifting-logbook-prod-web \
            --image="${{ steps.tf-prod.outputs.ar_repo }}/web:${{ github.sha }}" \
            --region="${{ env.REGION }}" \
            --project="${{ vars.GCP_PROD_PROJECT_ID }}" \
            --platform=managed \
            --allow-unauthenticated \
            --service-account="${{ steps.tf-prod.outputs.web_workload_sa }}" \
            --set-env-vars="API_URL=${{ steps.tf-prod.outputs.cloud_run_api_url }},PUBLIC_API_URL=${{ steps.tf-prod.outputs.cloud_run_api_url }}" \
            --update-secrets="CLERK_SECRET_KEY=lifting-logbook-prod-clerk-secret-key:latest,CLERK_PUBLISHABLE_KEY=lifting-logbook-prod-clerk-publishable-key:latest" \
            --quiet

      # ── Production web served-surface smoke (#490 item 3 / #382 / #407) ────
      # Verify the *live* prod web surface through the real Cloud Run ingress
      # after deploy, using the same two-probe shape the staging smoke uses (the
      # smoke-test job): /livez (Next.js runtime, owned by app code) and /sign-in
      # (Clerk auth flow, owned by middleware). Staging exercises this before the
      # promote gate, but prod previously had only the DB-backed API /readyz smoke
      # above — the web served surface was never re-checked in prod, so both
      # failure classes this catches reached production undetected:
      #   #382 — missing prod clerk-secret-key → web cannot serve auth (/sign-in)
      #   #407 — GFE intercepts /healthz before the container → probe /livez
      # The prod web service is --allow-unauthenticated, so no ID token is needed
      # (unlike the IAM-gated API /readyz above). A non-200 fails the deploy loudly
      # rather than surfacing days later; roll back the web revision per
      # docs/deploy.md on failure (automated rollback is a tracked follow-up). Runs
      # before the OTel steps below so telemetry rollout never gates this check.
      - name: Smoke test Cloud Run production — /livez (web runtime)
        run: |
          # %/ strips a trailing slash so $BASE_URL/livez is never double-slashed.
          BASE_URL="${{ steps.tf-prod.outputs.cloud_run_web_url }}"
          BASE_URL="${BASE_URL%/}"
          # Allow up to 3 minutes for the new web revision to become healthy.
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/livez" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Production /livez returned 200 — OK"
              exit 0
            fi
            echo "/livez attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Production /livez smoke FAILED — Next.js runtime not serving 200 (probe owned by app code, distinct from the Clerk auth flow). Roll back the web revision per docs/deploy.md." && exit 1

      - name: Smoke test Cloud Run production — /sign-in (Clerk auth flow)
        run: |
          BASE_URL="${{ steps.tf-prod.outputs.cloud_run_web_url }}"
          BASE_URL="${BASE_URL%/}"
          # The runtime is already up (/livez passed immediately before this step).
          # /sign-in should respond within seconds; if Clerk middleware cannot serve
          # 200 in 60s the #382 auth-outage class has occurred, and fast failure
          # improves operator turnaround.
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/sign-in" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Production /sign-in returned 200 — OK"
              exit 0
            fi
            echo "/sign-in attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Production /sign-in smoke FAILED — runtime healthy but Clerk auth flow not serving 200 (check the prod clerk-secret-key and the middleware matcher). Roll back the web revision per docs/deploy.md." && exit 1

      # ── OTel Collector (observability — #474) ──────────────────────────────
      # Mirror of the staging step (see deploy-staging) — deployed LAST in the job,
      # after the Cloud Run app deploys + the prod /readyz smoke above, so an
      # observability rollout problem cannot block app delivery or its verification.
      # Syncs the Grafana Cloud auth headers from Secret Manager into the
      # otel-collector-secrets k8s Secret and deploys the collector DaemonSet so prod
      # traces/logs/metrics reach Grafana Cloud. Guards fail loudly on an absent or
      # empty secret and never echo the value.
      - name: Sync otel-collector secrets to Kubernetes (production)
        if: steps.tf-prod.outputs.gke_enabled == 'true'
        run: |
          OTLP_H=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-prod-otel-otlp-auth-header" \
            --project="${{ vars.GCP_PROD_PROJECT_ID }}")
          [ -n "$OTLP_H" ] || { echo "ERROR: otel otlp-auth-header unpopulated (production) — run the Grafana token bootstrap in docs/deploy.md"; exit 1; }
          LOKI_H=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-prod-otel-loki-auth-header" \
            --project="${{ vars.GCP_PROD_PROJECT_ID }}")
          [ -n "$LOKI_H" ] || { echo "ERROR: otel loki-auth-header unpopulated (production) — run the Grafana token bootstrap in docs/deploy.md"; exit 1; }
          kubectl create secret generic otel-collector-secrets \
            --namespace=production \
            --from-literal=otlp-auth-header="$OTLP_H" \
            --from-literal=loki-auth-header="$LOKI_H" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm deploy otel-collector (GKE production)
        if: steps.tf-prod.outputs.gke_enabled == 'true'
        run: |
          source infra/observability/grafana-endpoints.env
          source infra/observability/otel-collector-image.env
          helm upgrade --install otel-collector ./infra/kubernetes/charts/otel-collector \
            --namespace=production \
            --values=infra/kubernetes/values/production-otel-collector.yaml \
            --set-string env.OTEL_COLLECTOR_OTLP_ENDPOINT="$OTEL_OTLP_ENDPOINT" \
            --set-string env.OTEL_COLLECTOR_LOKI_ENDPOINT="$OTEL_LOKI_ENDPOINT" \
            --set-string image.repository="${{ steps.tf-prod.outputs.otel_mirror_repo }}/${OTEL_COLLECTOR_IMAGE_REPO_PATH}" \
            --set-string image.digest="${OTEL_COLLECTOR_IMAGE_DIGEST}" \
            --wait --timeout=5m

      - name: Print deployment URLs and deployed version
        # This is a post-deploy reporting step, exactly like the audit step below — the
        # production deploy has already fully succeeded by the time this runs, so a git
        # hiccup here (e.g. an unresolvable SHA) must never turn an already-green deploy
        # red (#697 review).
        continue-on-error: true
        run: |
          SHORT_SHA=$(git rev-parse --short "${{ github.sha }}")
          SUBJECT=$(git log -1 --format='%s' "${{ github.sha }}")
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          {
            echo "## Production deployment complete"
            echo "- Cloud Run web: ${{ steps.tf-prod.outputs.cloud_run_web_url }}"
            echo "- Cloud Run API: ${{ steps.tf-prod.outputs.cloud_run_api_url }}"
            echo "- Deployed SHA: [\`${SHORT_SHA}\`](${COMMIT_URL}) — ${SUBJECT}"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Cancelled-run ancestry audit (#672 / #670) ──────────────────────────
      # 2026-07-03 (#670): a deploy-main run was silently cancelled by the concurrency
      # group above (#401) and nobody could quickly tell whether its changes had shipped
      # in a later run. This finds every `cancelled` deploy.yml run on main since the last
      # `success` run and checks whether that run's head SHA is an ancestor of what THIS
      # run deployed. On this repo's linear, squash-merge, fast-forward-only main history,
      # "ancestor: yes" is the expected/healthy result — every earlier commit is trivially
      # reachable from a later one. The value is making that confirmation automatic and
      # visible instead of requiring a human to notice and check by hand; "ancestor: no"
      # means something abnormal happened (rewritten history, a force-push) and should be
      # investigated.
      #
      # Purely advisory — continue-on-error: true, matching this file's existing "never
      # gate an already-succeeded production deploy on a reporting step" philosophy (see
      # plan-production and the GKE Helm A/B steps above). Both `gh run list` calls below
      # are `||`-guarded rather than left to the implicit `set -eo pipefail` GitHub Actions
      # already applies to every `run:` step: a bare `VAR=$(cmd)` assignment is NOT exempt
      # from that default, so an API hiccup is caught explicitly instead of aborting the
      # script mid-way through an already-partially-written summary.
      - name: Audit cancelled deploy runs since last success
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo ""
            echo "## Cancelled-run ancestry audit"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          LAST_SUCCESS_CREATED=$(gh run list --repo "${{ github.repository }}" \
            --workflow deploy.yml --branch main --status success \
            --limit 1 --json createdAt --jq '.[0].createdAt // ""') || {
            echo ":warning: \`gh run list\` failed looking up the last successful run — skipping this audit (advisory; does not affect the deploy)." >> "$GITHUB_STEP_SUMMARY"
            echo "::warning title=Cancelled-run audit skipped::gh run list (last success) failed."
            exit 0
          }

          if [ -z "$LAST_SUCCESS_CREATED" ]; then
            echo "No prior successful \`deploy.yml\` run found on \`main\` — nothing to bound the audit against (first successful deploy)." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # select() excludes this in-progress run itself — belt and suspenders, since a
          # run in progress cannot yet show status=cancelled, but cheap to guard anyway.
          # (A run's status is exactly one of success/cancelled/etc, so it can never also
          # match the earlier success-run query — no double-count risk from that side.)
          #
          # >= (not strict >) on --created: gh's --created filter is timestamp-precise, not
          # day-truncated (verified empirically against this repo's own run history), but a
          # cancelled run created in the SAME SECOND as the last success would be excluded
          # by strict >. >= closes that gap safely — it can never re-include the success run
          # itself, since that run's status is "success", not "cancelled" (#697 review).
          #
          # Explicit --limit: without it, gh defaults to 30, which could silently truncate
          # the audit during exactly the burst-cancellation scenario (#401) it exists to
          # catch. 100 comfortably covers any realistic gap between successful deploys.
          CANCELLED_TSV=$(gh run list --repo "${{ github.repository }}" \
            --workflow deploy.yml --branch main --status cancelled \
            --created ">=${LAST_SUCCESS_CREATED}" --limit 100 \
            --json databaseId,headSha,displayTitle \
            --jq "[.[] | select(.databaseId != ${{ github.run_id }})] | .[] | [.databaseId, .headSha, .displayTitle] | @tsv") || {
            echo ":warning: \`gh run list\` failed listing cancelled runs — skipping this audit (advisory; does not affect the deploy)." >> "$GITHUB_STEP_SUMMARY"
            echo "::warning title=Cancelled-run audit skipped::gh run list (cancelled) failed."
            exit 0
          }

          if [ -z "$CANCELLED_TSV" ]; then
            echo "No \`deploy.yml\` runs on \`main\` were cancelled since the last successful run (\`$LAST_SUCCESS_CREATED\`)." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "Cancelled run(s) on \`main\` since the last successful run:"
            echo ""
            echo "| Run | Cancelled SHA | Ancestor of deployed SHA? |"
            echo "|---|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          # Read from a plain variable via here-string, not piped into `while read` — a
          # pipe forks a subshell for the loop body, which would silently discard the
          # ANY_NON_ANCESTOR=1 set inside it.
          ANY_NON_ANCESTOR=0
          while IFS=$'\t' read -r RUN_ID SHA TITLE; do
            RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${RUN_ID}"
            SHORT="${SHA:0:7}"
            # Four backslashes, not two: bash's ${var//pat/repl} replacement text needs
            # \\\\ to produce a single literal backslash (verified empirically — the more
            # obvious-looking \\ silently no-ops here).
            TITLE="${TITLE//|/\\\\|}"

            # Tested directly in the `if` condition (exempt from set -e's abort-on-nonzero)
            # rather than capturing $? from a bare command, which would abort this script
            # the moment a cancelled run turns out NOT to be an ancestor (exit 1). Exit
            # codes: 0 = ancestor, 1 = not an ancestor, 128 = unresolvable SHA/error.
            if git merge-base --is-ancestor "$SHA" "${{ github.sha }}" 2>/dev/null; then
              echo "| [${RUN_ID}](${RUN_URL}) — ${TITLE} | \`${SHORT}\` | :white_check_mark: yes |" >> "$GITHUB_STEP_SUMMARY"
            else
              # rc=$? MUST be the first statement in this branch — it captures the
              # merge-base call's exit code above. Inserting any command (even an echo)
              # before this line would clobber $? and silently misclassify every
              # non-ancestor (128 vs 1) — do not add anything above this line (#697 review).
              rc=$?
              if [ "$rc" -eq 1 ]; then
                echo "| [${RUN_ID}](${RUN_URL}) — ${TITLE} | \`${SHORT}\` | :rotating_light: **NO — investigate** |" >> "$GITHUB_STEP_SUMMARY"
                ANY_NON_ANCESTOR=1
              else
                echo "| [${RUN_ID}](${RUN_URL}) — ${TITLE} | \`${SHORT}\` | :warning: error resolving ancestry (exit ${rc}) |" >> "$GITHUB_STEP_SUMMARY"
              fi
            fi
          done <<< "$CANCELLED_TSV"

          if [ "$ANY_NON_ANCESTOR" -eq 1 ]; then
            {
              echo ""
              echo ":rotating_light: **At least one cancelled run's changes do not appear to be an ancestor of this deploy.** Expected result on this repo's linear, fast-forward-only \`main\` history is always \"yes\" — investigate before assuming the cancelled run's changes shipped."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning title=Non-ancestor cancelled run detected::At least one cancelled deploy.yml run's head SHA is not an ancestor of ${{ github.sha }} — see the job summary table."
          fi
