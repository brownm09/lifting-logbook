name: Staging

# Fires on every PR push targeting main.
# Pipeline: [preflight] → terraform staging → build images → deploy staging →
#           staging integration tests → report status (PR comment)
#
# Production is NOT touched by this workflow — production deploys only via deploy.yml
# on push to main. The structural separation (two trigger files) is the primary
# production-safety guarantee. See docs/adr/ for rationale.
#
# Required GitHub repository secrets (must already be set for staging to function):
#   GCP_STAGING_WORKLOAD_IDENTITY_PROVIDER
#   GCP_STAGING_SERVICE_ACCOUNT
#   TF_STATE_BUCKET
#   GCP_BILLING_ACCOUNT
#
# Required GitHub repository variables:
#   GCP_STAGING_PROJECT_ID
#
# Environment-level secrets (Settings → Environments → staging → Environment secrets):
#   STAGING_CLERK_TEST_EMAIL     — email of the dedicated Clerk test account
#   STAGING_CLERK_TEST_PASSWORD  — password of the dedicated Clerk test account
#
# If GCP_STAGING_WORKLOAD_IDENTITY_PROVIDER is not set, all jobs are skipped cleanly.

on:
  pull_request:
    branches:
      - main

# Cancel superseded builds for the same PR; do NOT cancel running deploys
# (see staging-deploy-mutex job-level concurrency for that).
concurrency:
  group: staging-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  REGISTRY: us-central1-docker.pkg.dev
  ARTIFACT_REPO: lifting-logbook
  REGION: us-central1
  TF_DIR: infra/terraform

jobs:
  # ── 0. Preflight: detect whether staging is configured ────────────────────
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      ar_repo: ${{ steps.check.outputs.ar_repo }}
      image_affecting: ${{ steps.filter.outputs.image_affecting }}
    steps:
      - id: check
        env:
          STAGING_WIF: ${{ secrets.GCP_STAGING_WORKLOAD_IDENTITY_PROVIDER }}
        run: |
          if [[ -n "$STAGING_WIF" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Staging credentials found — full pipeline will run."
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "GCP_STAGING_WORKLOAD_IDENTITY_PROVIDER not set — skipping staging pipeline."
          fi

      # Classify the PR diff: image_affecting=false only when every changed file
      # matches one of the skip patterns below. Anything else (including
      # package.json, lockfiles, Dockerfiles, app/package source) forces rebuild.
      # `.github/**` is intentionally NOT in the skip list — workflow changes
      # can affect build context and should rebuild to be safe.
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            image_affecting:
              - '!**/*.md'
              - '!docs/**'
              - '!.claude/**'
              - '!sessions/**'
              - '!ROADMAP.md'
              - '!**/__tests__/**'
              - '!**/*.test.ts'
              - '!**/*.test.tsx'
              - '!**/*.spec.ts'
              - '!**/*.spec.tsx'
              - '!**/tests/**'
              - '!e2e/**'
              - '!infra/terraform/**'
              - '!infra/kubernetes/**'

  # ── 1. Terraform: staging ─────────────────────────────────────────────────
  terraform-staging:
    name: Terraform (staging)
    runs-on: ubuntu-latest
    needs: [preflight]
    if: needs.preflight.outputs.should_run == 'true'
    permissions:
      contents: read
      id-token: write
    outputs:
      gke_enabled: ${{ steps.tf-outputs.outputs.gke_enabled }}
      gke_cluster_name: ${{ steps.tf-outputs.outputs.gke_cluster_name }}
      cloud_run_api_url: ${{ steps.tf-outputs.outputs.cloud_run_api_url }}
      cloud_run_web_url: ${{ steps.tf-outputs.outputs.cloud_run_web_url }}
      ar_repo: ${{ steps.tf-outputs.outputs.ar_repo }}
      kms_key_name: ${{ steps.tf-outputs.outputs.kms_key_name }}
      api_wi_sa: ${{ steps.tf-outputs.outputs.api_wi_sa }}
      web_workload_sa: ${{ steps.tf-outputs.outputs.web_workload_sa }}

    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to GCP (staging)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_STAGING_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_STAGING_SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.7"
          terraform_wrapper: false

      - name: Terraform init (staging)
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state"
          terraform workspace select staging || terraform workspace new staging

      - name: Terraform apply (staging)
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -auto-approve \
            -var-file=terraform.tfvars.staging \
            -var="billing_account=${{ secrets.GCP_BILLING_ACCOUNT }}"

      - name: Capture Terraform outputs
        id: tf-outputs
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "gke_enabled=$(terraform output -raw gke_enabled)" >> "$GITHUB_OUTPUT"
          echo "gke_cluster_name=$(terraform output -raw gke_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "cloud_run_api_url=$(terraform output -raw cloud_run_api_url)" >> "$GITHUB_OUTPUT"
          echo "cloud_run_web_url=$(terraform output -raw cloud_run_web_url)" >> "$GITHUB_OUTPUT"
          echo "ar_repo=$(terraform output -raw artifact_registry_repo)" >> "$GITHUB_OUTPUT"
          echo "kms_key_name=$(terraform output -raw kms_key_name)" >> "$GITHUB_OUTPUT"
          echo "api_wi_sa=$(terraform output -raw cicd_service_account_email)" >> "$GITHUB_OUTPUT"
          echo "web_workload_sa=$(terraform output -raw web_workload_sa)" >> "$GITHUB_OUTPUT"

  # ── 2. Build and push Docker images ──────────────────────────────────────
  build-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [preflight, terraform-staging]
    if: |
      needs.preflight.outputs.should_run == 'true' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (needs.terraform-staging.result == 'success' || needs.terraform-staging.result == 'skipped')
    permissions:
      contents: read
      id-token: write
    outputs:
      ar_repo: ${{ steps.ar.outputs.repo }}
      image_tag: ${{ steps.image-tag.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v5

      # Decide whether to rebuild or reuse a prior image.
      #
      # Reuse is only chosen when the diff is non-image-affecting AND a prior
      # successful staging run exists on this PR. When reusing, image_tag is set
      # to the floating tag `pr-<N>` (which the build step below stamps onto
      # every built image alongside `:<sha>`). The floating tag is the only
      # reuse target that is guaranteed to point at an actually-pushed image:
      #
      # Using the prior run's headSha breaks after the second consecutive skip
      # run, because that run's headSha is a commit at which *no image was
      # built* — its own deploy reused an earlier SHA's image. Walking back the
      # run list to find a non-skip run is brittle (job outputs aren't queryable
      # via gh api), and re-tagging in Artifact Registry adds operational
      # surface. The floating tag avoids all three failure modes at the cost of
      # the SHA-as-image-tag invariant on skip runs only.
      #
      # On cold start (skip-eligible diff, no prior successful run on this PR),
      # we fall through to a fresh build — see issue #358 cold-start discussion.
      - name: Resolve image tag
        id: image-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ needs.preflight.outputs.image_affecting }}" == "false" ]]; then
            # --branch is a ref filter, not a PR filter. Branch reuse across
            # closed PRs could surface stale runs; the per-session unique
            # `claude/<slug>` naming convention makes this effectively impossible
            # in practice, and the floating-tag fallback below would still point
            # at a real image even if it happened.
            PREV_RUN=$(gh run list \
              --branch "${{ github.event.pull_request.head.ref }}" \
              --workflow staging.yml \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // ""')
            if [[ -n "$PREV_RUN" ]]; then
              FLOATING_TAG="pr-${{ github.event.pull_request.number }}"
              echo "image_tag=$FLOATING_TAG" >> "$GITHUB_OUTPUT"
              echo "skip_build=true" >> "$GITHUB_OUTPUT"
              echo "Diff is non-image-affecting — reusing floating tag: $FLOATING_TAG (prior run id: $PREV_RUN)"
              exit 0
            fi
            echo "Diff is non-image-affecting but no prior successful run found — building fresh."
          fi
          echo "image_tag=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          echo "skip_build=false" >> "$GITHUB_OUTPUT"

      # GUARD-DISCIPLINE: every step below `Resolve image tag` except `Resolve
      # Artifact Registry repo` (which only echoes a pre-resolved value into a
      # step output and is needed by downstream consumers) must carry
      #   if: steps.image-tag.outputs.skip_build != 'true'
      # Adding a step without that guard breaks the skip-build optimization
      # silently for that step. If you add a step here, copy the guard from a
      # neighboring step.
      - name: Authenticate to GCP (staging)
        if: steps.image-tag.outputs.skip_build != 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_STAGING_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_STAGING_SERVICE_ACCOUNT }}

      - name: Resolve Artifact Registry repo
        id: ar
        run: echo "repo=${{ needs.terraform-staging.outputs.ar_repo }}" >> "$GITHUB_OUTPUT"

      - name: Resolve API URL for web image build
        if: steps.image-tag.outputs.skip_build != 'true'
        id: api-url
        run: echo "url=${{ needs.terraform-staging.outputs.cloud_run_api_url }}" >> "$GITHUB_OUTPUT"

      - name: Configure Docker for Artifact Registry
        if: steps.image-tag.outputs.skip_build != 'true'
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Fetch staging Clerk publishable key
        if: steps.image-tag.outputs.skip_build != 'true'
        id: clerk-pub-key
        run: |
          CLERK_PUB=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-stg-clerk-publishable-key" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}")
          echo "key=$CLERK_PUB" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.image-tag.outputs.skip_build != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        if: steps.image-tag.outputs.skip_build != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ steps.ar.outputs.repo }}/api:${{ github.event.pull_request.head.sha }}
            ${{ steps.ar.outputs.repo }}/api:pr-${{ github.event.pull_request.number }}
          # Per-image cache scope (#407). Isolates the PR-branch API build
          # from the deploy.yml main-branch API cache, mirroring the web scoping.
          cache-from: type=gha,scope=api-pr-v2
          cache-to: type=gha,scope=api-pr-v2,mode=max

      - name: Build and push web image
        if: steps.image-tag.outputs.skip_build != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ steps.ar.outputs.repo }}/web:${{ github.event.pull_request.head.sha }}
            ${{ steps.ar.outputs.repo }}/web:pr-${{ github.event.pull_request.number }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.api-url.outputs.url }}
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ steps.clerk-pub-key.outputs.key }}
          # Scoped cache (#407). Isolates PR-branch builds from the deploy.yml
          # main-branch web caches so a stale layer in one workflow cannot
          # silently poison the other.
          cache-from: type=gha,scope=web-pr-v2
          cache-to: type=gha,scope=web-pr-v2,mode=max

  # ── 3a. Deploy API (staging) ──────────────────────────────────────────────
  # Split into per-service jobs so they run in parallel within a single PR.
  # Cross-PR serialization is preserved per-service via separate mutex groups —
  # two PRs cannot race the same Cloud Run service or Helm release, but PR #1's
  # API deploy may overlap with PR #2's web deploy (disjoint targets, safe).
  deploy-api:
    name: Deploy API (staging)
    runs-on: ubuntu-latest
    needs: [preflight, terraform-staging, build-images]
    if: |
      needs.preflight.outputs.should_run == 'true' &&
      needs.build-images.result == 'success'
    permissions:
      contents: read
      id-token: write
    environment: staging
    concurrency:
      group: staging-deploy-mutex-api
      cancel-in-progress: false
    outputs:
      clerk_configured: ${{ steps.clerk-check.outputs.configured }}
      cloud_run_api_deployed: ${{ steps.deploy-api.outcome == 'success' }}

    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to GCP (staging)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_STAGING_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_STAGING_SERVICE_ACCOUNT }}

      # ── Database migrations (ADR-027) ──────────────────────────────────────
      # Apply pending Prisma migrations to the staging DB via the in-VPC Cloud
      # Run Job (created by terraform-staging) before the API revision goes live,
      # so staging exercises the same migrate path as prod (#460). Terraform
      # applies a placeholder image, so set the real image, then execute + wait.
      # continue-on-error matches the staging Cloud Run deploy below: staging
      # Cloud SQL connectivity is intermittently flaky (#344), and the Staging
      # Integration Tests are the authoritative gate — a transient migrate blip
      # should not hard-fail the job before they run. A genuine migration failure
      # still surfaces as an integration-test failure (missing tables).
      - name: Run database migrations (staging)
        continue-on-error: true
        run: |
          gcloud run jobs update lifting-logbook-stg-migrate \
            --image="${{ needs.build-images.outputs.ar_repo }}/api:${{ needs.build-images.outputs.image_tag }}" \
            --region="${{ env.REGION }}" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}" \
            --quiet
          gcloud run jobs execute lifting-logbook-stg-migrate \
            --region="${{ env.REGION }}" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}" \
            --wait

      - name: Set up GKE credentials
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ needs.terraform-staging.outputs.gke_cluster_name }}
          location: ${{ env.REGION }}
          project_id: ${{ vars.GCP_STAGING_PROJECT_ID }}

      - name: Set up Helm
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        uses: azure/setup-helm@v4

      - name: Ensure staging namespace
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        run: kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f -

      - name: Sync API secrets to Kubernetes
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        run: |
          DB_URL=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-stg-database-url" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}")
          SYS_DB_URL=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-stg-system-database-url" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}")
          CLERK_KEY=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-stg-clerk-secret-key" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}")
          kubectl create secret generic api-secrets \
            --namespace=staging \
            --from-literal=database-url="$DB_URL" \
            --from-literal=system-database-url="$SYS_DB_URL" \
            --from-literal=clerk-secret-key="$CLERK_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Rollback stuck Helm API release (GKE staging)
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        run: |
          STATUS=$(helm status api --namespace=staging --output=json 2>/dev/null \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['status'])" 2>/dev/null || echo "not-found")
          if [[ "$STATUS" == "pending-upgrade" || "$STATUS" == "pending-install" || "$STATUS" == "pending-rollback" ]]; then
            echo "Rolling back stuck release: api (status=$STATUS)"
            helm rollback api --namespace=staging || true
          fi
          # Force-delete API pods stuck in Terminating — they block helm --wait on the next upgrade.
          kubectl get pods -n staging -l app.kubernetes.io/instance=api -o json 2>/dev/null \
            | python3 -c "import sys,json; [print(p['metadata']['name']) for p in json.load(sys.stdin).get('items',[]) if p.get('metadata',{}).get('deletionTimestamp')]" \
            | xargs -r kubectl delete pod --force --grace-period=0 -n staging || true

      - name: Helm deploy API (GKE staging)
        id: helm-deploy-api
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        # GKE Autopilot node provisioning can exceed 10m on cold starts; treat as
        # non-fatal so Cloud Run deploy (the integration-test target) always runs.
        continue-on-error: true
        run: |
          helm upgrade --install api ./infra/kubernetes/charts/api \
            --namespace=staging \
            --values=infra/kubernetes/values/staging-api.yaml \
            --set image.repository="${{ needs.build-images.outputs.ar_repo }}/api" \
            --set image.tag="${{ needs.build-images.outputs.image_tag }}" \
            --set gcp.projectId="${{ vars.GCP_STAGING_PROJECT_ID }}" \
            --set gcp.kmsKeyName="${{ needs.terraform-staging.outputs.kms_key_name }}" \
            --set gcp.serviceAccountEmail="${{ needs.terraform-staging.outputs.api_wi_sa }}" \
            --set env.NODE_ENV=staging \
            --wait --timeout=10m --force

      - name: Fetch GKE API pod logs on failure
        if: steps.helm-deploy-api.outcome == 'failure'
        run: |
          echo "=== GKE API pod status ==="
          kubectl get pods -n staging -l app.kubernetes.io/instance=api 2>&1 || true
          POD=$(kubectl get pods -n staging -l app.kubernetes.io/instance=api \
            --sort-by=.metadata.creationTimestamp \
            -o jsonpath='{.items[-1].metadata.name}' 2>/dev/null || true)
          if [[ -n "$POD" ]]; then
            echo "=== Logs for pod: $POD ==="
            kubectl logs -n staging "$POD" --tail=100 2>&1 || true
            echo "=== Events for pod: $POD ==="
            kubectl describe pod -n staging "$POD" 2>&1 | tail -40 || true
          else
            echo "No API pod found — Helm may have failed before pod creation"
          fi

      # NOTE: this step is duplicated verbatim in `deploy-web` below. Both jobs
      # need the gate independently because they run in parallel and either may
      # fire its Cloud Run deploy first. If you change the secret name, the
      # placeholder check, or the output shape here, update the copy in
      # `deploy-web` in the same commit. The duplication is intentional (one
      # extra ~5s Secret Manager call per deploy buys full intra-PR parallelism).
      - name: Check Clerk secret key configured
        id: clerk-check
        run: |
          CLERK_KEY=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-stg-clerk-secret-key" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}")
          if [[ "$CLERK_KEY" == "REPLACE_ME" || -z "$CLERK_KEY" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  lifting-logbook-stg-clerk-secret-key is still the placeholder value."
            echo "    Cloud Run deploys are skipped until the key is configured."
            echo "    Follow docs/deploy.md Step 4 to set the staging Clerk secret key."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy API to Cloud Run (staging)
        id: deploy-api
        if: steps.clerk-check.outputs.configured == 'true'
        # Cloud SQL connectivity issues tracked in #344. continue-on-error allows the
        # job to complete so the log-fetch step below can capture the crash reason.
        continue-on-error: true
        run: |
          gcloud run deploy lifting-logbook-stg-api \
            --image="${{ needs.build-images.outputs.ar_repo }}/api:${{ needs.build-images.outputs.image_tag }}" \
            --region="${{ env.REGION }}" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}" \
            --platform=managed \
            --no-allow-unauthenticated \
            --quiet

      - name: Fetch Cloud Run API logs on failure
        if: steps.deploy-api.outcome == 'failure'
        run: |
          # Cloud Logging ingestion for Cloud Run stdout/stderr typically takes
          # 30-90s after the container writes the logs. Without a delay the query
          # returns before application logs are indexed, showing only infra events.
          echo "Waiting 90s for Cloud Logging ingestion..."
          sleep 90
          echo "=== Cloud Run API crash logs (last 100 lines, all severities) ==="
          gcloud logging read \
            'resource.type="cloud_run_revision" AND resource.labels.service_name="lifting-logbook-stg-api"' \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}" \
            --limit=100 \
            --format="table(timestamp,severity,textPayload,jsonPayload.message)" \
            --order=desc \
            --freshness=10m \
            2>&1 || true

  # ── 3b. Deploy web (staging) ──────────────────────────────────────────────
  deploy-web:
    name: Deploy web (staging)
    runs-on: ubuntu-latest
    needs: [preflight, terraform-staging, build-images]
    if: |
      needs.preflight.outputs.should_run == 'true' &&
      needs.build-images.result == 'success'
    permissions:
      contents: read
      id-token: write
    environment: staging
    concurrency:
      group: staging-deploy-mutex-web
      cancel-in-progress: false
    outputs:
      web_url: ${{ steps.deploy-web.outputs.url }}

    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to GCP (staging)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_STAGING_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_STAGING_SERVICE_ACCOUNT }}

      - name: Set up GKE credentials
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ needs.terraform-staging.outputs.gke_cluster_name }}
          location: ${{ env.REGION }}
          project_id: ${{ vars.GCP_STAGING_PROJECT_ID }}

      - name: Set up Helm
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        uses: azure/setup-helm@v4

      - name: Ensure staging namespace
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        run: kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f -

      - name: Sync web secrets to Kubernetes
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        run: |
          CLERK_PUB=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-stg-clerk-publishable-key" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}")
          kubectl create secret generic web-secrets \
            --namespace=staging \
            --from-literal=clerk-publishable-key="$CLERK_PUB" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Rollback stuck Helm web release (GKE staging)
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        run: |
          STATUS=$(helm status web --namespace=staging --output=json 2>/dev/null \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['status'])" 2>/dev/null || echo "not-found")
          if [[ "$STATUS" == "pending-upgrade" || "$STATUS" == "pending-install" || "$STATUS" == "pending-rollback" ]]; then
            echo "Rolling back stuck release: web (status=$STATUS)"
            helm rollback web --namespace=staging || true
          fi
          kubectl get pods -n staging -l app.kubernetes.io/instance=web -o json 2>/dev/null \
            | python3 -c "import sys,json; [print(p['metadata']['name']) for p in json.load(sys.stdin).get('items',[]) if p.get('metadata',{}).get('deletionTimestamp')]" \
            | xargs -r kubectl delete pod --force --grace-period=0 -n staging || true

      - name: Helm deploy web (GKE staging)
        if: needs.terraform-staging.outputs.gke_enabled == 'true'
        continue-on-error: true
        run: |
          API_CLUSTER_URL="http://api.staging.svc.cluster.local:3000"
          helm upgrade --install web ./infra/kubernetes/charts/web \
            --namespace=staging \
            --values=infra/kubernetes/values/staging-web.yaml \
            --set image.repository="${{ needs.build-images.outputs.ar_repo }}/web" \
            --set image.tag="${{ needs.build-images.outputs.image_tag }}" \
            --set gcp.projectId="${{ vars.GCP_STAGING_PROJECT_ID }}" \
            --set env.NODE_ENV=staging \
            --set env.API_URL="$API_CLUSTER_URL" \
            --wait --timeout=10m

      # NOTE: this step is duplicated verbatim from `deploy-api` above. See the
      # comment there for the rationale; keep the two copies in sync.
      - name: Check Clerk secret key configured
        id: clerk-check
        run: |
          CLERK_KEY=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-stg-clerk-secret-key" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}")
          if [[ "$CLERK_KEY" == "REPLACE_ME" || -z "$CLERK_KEY" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy web to Cloud Run (staging)
        id: deploy-web
        if: steps.clerk-check.outputs.configured == 'true'
        run: |
          # Capture gcloud output so we can parse the canonical "Service URL:" line.
          # gcloud run services describe --format="value(status.url)" returns the legacy
          # *.a.run.app URL which may no longer be routed to the current service instance;
          # the "Service URL:" line from gcloud run deploy is always the live canonical URL.
          DEPLOY_OUT=$(gcloud run deploy lifting-logbook-stg-web \
            --image="${{ needs.build-images.outputs.ar_repo }}/web:${{ needs.build-images.outputs.image_tag }}" \
            --region="${{ env.REGION }}" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}" \
            --platform=managed \
            --allow-unauthenticated \
            --service-account="${{ needs.terraform-staging.outputs.web_workload_sa }}" \
            --update-env-vars="API_URL=${{ needs.terraform-staging.outputs.cloud_run_api_url }}" \
            --update-secrets="CLERK_SECRET_KEY=lifting-logbook-stg-clerk-secret-key:latest" \
            --quiet 2>&1)
          echo "$DEPLOY_OUT"
          WEB_URL=$(echo "$DEPLOY_OUT" | grep "Service URL:" | awk '{print $NF}')
          echo "url=${WEB_URL}" >> "$GITHUB_OUTPUT"

  # ── 4. Staging integration tests ─────────────────────────────────────────
  staging-integration-tests:
    name: Staging Integration Tests
    runs-on: ubuntu-latest
    needs: [preflight, terraform-staging, deploy-api, deploy-web]
    # Only skip when staging is not configured at all (no GCP credentials).
    # When staging IS configured, always() ensures the job runs even when a
    # needs job hard-fails (e.g. GCP auth failure in deploy-api/deploy-web) —
    # without it GitHub Actions auto-skips dependents on failure, which branch
    # protection treats as passing and silently bypasses the merge gate. See #345.
    if: always() && needs.preflight.outputs.should_run == 'true'
    permissions:
      contents: read
      id-token: write
    # environment: staging grants access to environment-level secrets
    # (STAGING_CLERK_TEST_EMAIL, STAGING_CLERK_TEST_PASSWORD).
    environment: staging

    steps:
      - name: Verify deploy prerequisites
        run: |
          # deploy-api.result is the source of truth for "did the job deliver its outputs".
          # The integration-tests job runs under `if: always()` (see #345), so deploy-api
          # can reach this step in any of three non-success states:
          #   - skipped/cancelled: upstream build-images failed (per deploy-api's `if:` guard).
          #   - failure: deploy-api ran but a step errored (e.g., GCP auth, Cloud Run deploy).
          # In all three, `clerk_configured` and `cloud_run_api_deployed` may be empty rather
          # than 'false', so a plain `clerk_configured != 'true'` check mis-reports any of
          # them as a Clerk misconfiguration. See #398 / PR #395 for the motivating incident.
          DEPLOY_RESULT='${{ needs.deploy-api.result }}'
          CLERK_OUT='${{ needs.deploy-api.outputs.clerk_configured }}'
          API_DEPLOYED='${{ needs.deploy-api.outputs.cloud_run_api_deployed }}'

          if [[ "$DEPLOY_RESULT" != "success" ]]; then
            echo "::error::deploy-api did not succeed (result: $DEPLOY_RESULT). If 'skipped' or 'cancelled', build-images likely failed — check the 'Build & Push Images' job (e.g., Artifact Registry 504 on layer-blob push) and re-run failed jobs if transient. If 'failure', open the Deploy API (staging) job log for the step that errored (commonly GCP auth or the Cloud Run deploy itself)."
            exit 1
          fi
          if [[ "$CLERK_OUT" != "true" ]]; then
            echo "::error::Staging Clerk secret key is not configured. Follow docs/deploy.md Step 4 to set lifting-logbook-stg-clerk-secret-key in GCP Secret Manager, then re-run CI."
            exit 1
          fi
          if [[ "$API_DEPLOYED" != "true" ]]; then
            echo "::error::Cloud Run API deploy failed — integration tests cannot run. Check the 'Fetch Cloud Run API logs on failure' step in the Deploy API (staging) job. Tracked in #344."
            exit 1
          fi

      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Authenticate to GCP (staging) for Secret Manager access
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_STAGING_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_STAGING_SERVICE_ACCOUNT }}

      - name: Wait for staging to be ready
        id: wait-ready
        run: |
          WEB_URL="${{ needs.deploy-web.outputs.web_url }}"
          # Clerk dev-mode (pk_test_ key) rewrites the first unauthenticated request
          # to an internal /clerk_<hash> path for dev-browser cookie initialization.
          # That path has no Next.js page → 404. The app IS running; the reliable
          # readiness signal is the x-powered-by: Next.js response header, which
          # is present on every response from the Next.js server regardless of
          # auth state or Clerk mode (dev vs prod).
          for i in $(seq 1 18); do
            HEADERS=$(curl -s -D - -o /dev/null "${WEB_URL}/" || true)
            if echo "$HEADERS" | grep -qi "x-powered-by: Next.js"; then
              echo "Staging web is up — Next.js is responding (attempt $i)."
              exit 0
            fi
            STATUS=$(echo "$HEADERS" | head -1 | grep -o '[0-9]\{3\}' | head -1)
            echo "Attempt $i: got ${STATUS:-no-response} (no Next.js header), retrying in 10s..."
            sleep 10
          done
          echo "Staging did not become ready in time" && exit 1

      - name: Fetch Cloud Run web logs on failure
        if: failure() && steps.wait-ready.outcome == 'failure'
        run: |
          echo "Waiting 30s for Cloud Logging ingestion..."
          sleep 30
          echo "=== Cloud Run web service logs (last 50 lines, all severities) ==="
          gcloud logging read \
            'resource.type="cloud_run_revision" AND resource.labels.service_name="lifting-logbook-stg-web"' \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}" \
            --limit=50 \
            --format="table(timestamp,severity,textPayload,jsonPayload.message)" \
            --order=desc \
            --freshness=10m \
            2>&1 || true

      - name: Fetch staging Clerk secrets
        run: |
          CLERK_SECRET_KEY=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-stg-clerk-secret-key" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}")
          echo "::add-mask::$CLERK_SECRET_KEY"
          echo "CLERK_SECRET_KEY=$CLERK_SECRET_KEY" >> "$GITHUB_ENV"

          # @clerk/testing clerkSetup() requires CLERK_PUBLISHABLE_KEY (no NEXT_PUBLIC_ prefix)
          CLERK_PUBLISHABLE_KEY=$(gcloud secrets versions access latest \
            --secret="lifting-logbook-stg-clerk-publishable-key" \
            --project="${{ vars.GCP_STAGING_PROJECT_ID }}")
          echo "CLERK_PUBLISHABLE_KEY=$CLERK_PUBLISHABLE_KEY" >> "$GITHUB_ENV"

      - name: Run staging integration tests
        working-directory: apps/web
        run: npx playwright test --config=playwright.config.staging.ts
        env:
          CI: 'true'
          STAGING_WEB_URL: ${{ needs.deploy-web.outputs.web_url }}
          STAGING_API_URL: ${{ needs.terraform-staging.outputs.cloud_run_api_url }}
          STAGING_CLERK_TEST_EMAIL: ${{ secrets.STAGING_CLERK_TEST_EMAIL }}
          STAGING_CLERK_TEST_PASSWORD: ${{ secrets.STAGING_CLERK_TEST_PASSWORD }}
          # CLERK_SECRET_KEY is set in GITHUB_ENV by the fetch step above

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: staging-playwright-report
          path: apps/web/playwright-report/

  # ── 5. Report status (PR comment) ────────────────────────────────────────
  report-status:
    name: Report Staging Status
    runs-on: ubuntu-latest
    needs: [preflight, terraform-staging, deploy-api, deploy-web, staging-integration-tests]
    if: always()
    permissions:
      pull-requests: write

    steps:
      - name: Post staging result comment
        uses: actions/github-script@v9
        with:
          script: |
            const shouldRun = '${{ needs.preflight.outputs.should_run }}' === 'true';
            const testResult = '${{ needs.staging-integration-tests.result }}';
            const deployApiResult = '${{ needs.deploy-api.result }}';
            const webUrl = '${{ needs.deploy-web.outputs.web_url }}';

            let body;
            const clerkConfigured = '${{ needs.deploy-api.outputs.clerk_configured }}' === 'true';
            const cloudRunApiDeployed = '${{ needs.deploy-api.outputs.cloud_run_api_deployed }}' === 'true';
            // Any non-success deployApiResult means the deploy-api job didn't deliver
            // its outputs cleanly — skipped/cancelled (upstream build-images failed) or
            // failure (an internal step errored, e.g., GCP auth). In all of these,
            // clerkConfigured and cloudRunApiDeployed default to false because the
            // outputs are empty strings, so we surface the upstream state explicitly
            // rather than mis-reporting it as a Clerk-secret misconfiguration —
            // see #398 / PR #395.
            if (!shouldRun) {
              body = '⚪ **Staging skipped** — `GCP_STAGING_WORKLOAD_IDENTITY_PROVIDER` is not configured.';
            } else if (deployApiResult !== 'success') {
              const upstreamHint = (deployApiResult === 'skipped' || deployApiResult === 'cancelled')
                ? 'likely because `build-images` failed'
                : 'a step in deploy-api errored (commonly GCP auth or the Cloud Run deploy itself)';
              body = `⚠️ **Staging integration tests did not run** — \`deploy-api\` result was \`${deployApiResult}\`; ${upstreamHint}. Open the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) and re-run failed jobs if the failure was transient (e.g., Artifact Registry 504 on layer-blob push).`;
            } else if (!clerkConfigured) {
              body = '⚠️ **Staging integration tests skipped** — `lifting-logbook-stg-clerk-secret-key` in GCP Secret Manager is still the placeholder value. Follow [docs/deploy.md Step 4](https://github.com/${{ github.repository }}/blob/${{ github.event.pull_request.head.sha }}/docs/deploy.md#step-4--sign-up-for-clerk-and-create-two-apps) to configure the staging Clerk secret key, then re-run CI.';
            } else if (!cloudRunApiDeployed) {
              body = `⚠️ **Staging integration tests skipped** — Cloud Run API deploy failed (container did not start). Check the "Fetch Cloud Run API logs on failure" step in the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for the crash reason. Tracked in [#344](https://github.com/${{ github.repository }}/issues/344).`;
            } else if (testResult === 'success') {
              body = `✅ **Staging integration tests passed**\n\n🔗 [Staging environment](${webUrl})`;
            } else if (testResult === 'failure') {
              body = `❌ **Staging integration tests failed** — see the [Playwright report artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.\n\n🔗 [Staging environment](${webUrl})`;
            } else {
              body = `⚠️ **Staging integration tests did not run** (status: ${testResult})`;
            }

            // Find and update an existing bot comment, or create a new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Staging integration tests') ||
              c.body.includes('Staging skipped')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
