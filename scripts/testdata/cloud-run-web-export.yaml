# Test fixture for scripts/inject-otel-sidecar.py — WEB service (#804).
#
# A *representative, synthetic* `gcloud run services describe --format=export` of the web
# Cloud Run service — modeled on infra/terraform/cloud-run.tf's web service and the real export
# shape the deploy pipeline pipes into the injector. It is NOT a capture of a live service:
# every project id, URL, revision, and secret *name* here is a placeholder, and a Cloud Run
# manifest references Secret Manager secrets by name only (no secret material), so nothing
# sensitive is committed.
#
# It exercises the web branch of the injector (INGRESS_CONTAINER_NAME=web), which differs from
# the api fixture in the ways that matter for #804:
#   * one ingress container carrying a `ports:` block on 3001 (how the injector identifies it),
#   * a non-"web" container name (proves the rename to "web"),
#   * a stale image ref (proves the image is replaced),
#   * NO SYSTEM_DATABASE_URL and NO pre-existing OTEL_EXPORTER_OTLP_ENDPOINT — the web
#     container carries neither, so this proves the SYSTEM_DATABASE_URL drop is a harmless
#     no-op and the endpoint is *added* (not merely replaced),
#   * Terraform-managed base config — serviceAccountName (web-wi), the two Clerk secret envs,
#     API_URL / PUBLIC_API_URL (all preserved verbatim),
#   * NO pre-existing volumes — proves the injector adds the `otelconfig` volume from scratch,
#   * server-assigned fields the injector strips — run.googleapis.com/urls,
#     run.googleapis.com/ingress-status, the revision `name`, client.knative.dev/nonce.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  annotations:
    run.googleapis.com/client-name: gcloud
    run.googleapis.com/ingress: all
    run.googleapis.com/ingress-status: all
    run.googleapis.com/urls: '["https://lifting-logbook-prod-web-000000000000.us-central1.run.app"]'
  labels:
    cloud.googleapis.com/location: us-central1
  name: lifting-logbook-prod-web
  namespace: '000000000000'
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: '10'
        autoscaling.knative.dev/minScale: '1'
        run.googleapis.com/startup-cpu-boost: 'true'
      labels:
        client.knative.dev/nonce: deadbeefcafe0002
        run.googleapis.com/startupProbeType: Default
      name: lifting-logbook-prod-web-00042-abc
    spec:
      containerConcurrency: 80
      containers:
      - name: lifting-logbook-prod-web-1
        image: us-central1-docker.pkg.dev/example-project/lifting-logbook/web:oldsha0000000
        ports:
        - containerPort: 3001
          name: http1
        env:
        - name: NODE_ENV
          value: production
        - name: PORT
          value: '3001'
        - name: API_URL
          value: https://lifting-logbook-prod-api-000000000000.us-central1.run.app
        - name: PUBLIC_API_URL
          value: https://lifting-logbook-prod-api-000000000000.us-central1.run.app
        - name: CLERK_PUBLISHABLE_KEY
          valueFrom:
            secretKeyRef:
              key: latest
              name: lifting-logbook-prod-clerk-publishable-key
        - name: CLERK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              key: latest
              name: lifting-logbook-prod-clerk-secret-key
        resources:
          limits:
            cpu: '1'
            memory: 512Mi
        startupProbe:
          failureThreshold: 1
          periodSeconds: 240
          tcpSocket:
            port: 3001
          timeoutSeconds: 240
      serviceAccountName: lifting-logbook-prod-web-wi@example-project.iam.gserviceaccount.com
      timeoutSeconds: 300
  traffic:
  - latestRevision: true
    percent: 100
